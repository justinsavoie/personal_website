body{
  font-family:system-ui;
  display:flex;
  justify-content:center;
  align-items:flex-start;
  min-height:100vh;
  background:#f0f2f5;
  padding:10px;
}

.app{
  width:100%;
  max-width:420px;
  display:flex;
  flex-direction:column;
  gap:10px;
}

.top{
  display:flex;
  justify-content:space-between;
  font-weight:bold;
  font-size:18px;
}

.main{
  background:white;
  padding:12px;
  border-radius:16px;
  display:flex;
  flex-direction:column;
  gap:10px;
}

.country-display{
  text-align:center;
  font-size:28px;
  font-weight:900;
  padding:16px 8px 8px;
  min-height:70px;
  display:flex;
  align-items:center;
  justify-content:center;
  line-height:1.2;
}

.question{
  text-align:center;
  font-size:16px;
  font-weight:600;
  color:#555;
  min-height:22px;
}

.controls{
  display:flex;
  gap:6px;
}

button{
  flex:1;
  padding:10px;
  font-size:16px;
  border:none;
  border-radius:12px;
  background:#222;
  color:white;
  font-weight:bold;
  cursor:pointer;
}

button:disabled{
  background:#aaa;
  cursor:default;
}

.grid{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:8px;
}

.choice{
  padding:14px 8px;
  font-size:14px;
  font-weight:700;
  border-radius:12px;
  background:#ffffff;
  border:2px solid #000;
  color:#000;
  cursor:pointer;
  line-height:1.3;
}

.good{ background:#00c853; color:white; border-color:#00c853; }
.bad{  background:#d50000; color:white; border-color:#d50000; }
</style>
</head>
<body>

  <div class="top">
    <div>✅ <span id="hits">0</span></div>
    <div>❌ <span id="misses">0</span></div>
  </div>
  <div class="main">
    <div class="country-display" id="country">?</div>
    <div class="question" id="question">Quelle est la capitale ?</div>
    <div id="grid" class="grid"></div>
    <div class="controls">

      <button id="repeat">🔊</button>

let hits = 0, misses = 0;
let round = null, lock = false;
let voices = [], voicesReady = false;

function loadVoices(){
  voices = speechSynthesis.getVoices();
  if(voices.length) voicesReady = true;
}
speechSynthesis.onvoiceschanged = loadVoices;
loadVoices();

function speak(text){
  if(!voicesReady) return;
  speechSynthesis.cancel();
  const u = new SpeechSynthesisUtterance(text);
  const fr = voices.find(v => v.lang.startsWith("fr"));
  if(fr) u.voice = fr;
  u.lang = "fr-FR";
  u.rate = 0.9;
  speechSynthesis.speak(u);
}

function shuffle(a){ return [...a].sort(() => Math.random() - 0.5); }

function nextRound(){
  lock = false;

  const target = COUNTRIES[Math.floor(Math.random() * COUNTRIES.length)];
  const sameR  = COUNTRIES.filter(c => c !== target && c.r === target.r);
  const pool   = sameR.length >= 3 ? sameR : COUNTRIES.filter(c => c !== target);
  const wrongs = shuffle(pool).slice(0, 3);
  const choices = shuffle([target, ...wrongs]);

  round = {target, choices};

  document.getElementById("country").textContent = target.name;
  document.getElementById("question").textContent = "Quelle est la capitale ?";
  renderChoices(choices);
  setTimeout(() => speak(target.name), 400);
}

function renderChoices(choices){
  const grid = document.getElementById("grid");
  grid.innerHTML = "";
  choices.forEach(c => {
    const b = document.createElement("button");
    b.className = "choice";
    b.textContent = c.capital;
    b.onclick = () => {
      if(lock) return;
      if(c === round.target){
        lock = true;
        hits++;
        document.getElementById("hits").textContent = hits;
        b.classList.add("good");
        document.getElementById("question").textContent = "✓ " + c.capital;
        speak(c.capital);
        setTimeout(nextRound, 1100);
      } else {
        misses++;
        document.getElementById("misses").textContent = misses;
        b.classList.add("bad");
        speak(c.capital);
        setTimeout(() => b.classList.remove("bad"), 400);
      }
    };
    grid.appendChild(b);
  });
}

document.getElementById("start").onclick = () => {
  speechSynthesis.resume();
  nextRound();
};

document.getElementById("repeat").onclick = () => {
  speechSynthesis.resume();
  if(round) speak(round.target.name);
};

</script>
