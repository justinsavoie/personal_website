<!doctype html>
<html lang="fr">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Jeu géographie – Trouve le pays</title>
<style>
*{ box-sizing:border-box; margin:0; padding:0; }

body{
  font-family:system-ui;
  display:flex;
  justify-content:center;
  align-items:flex-start;
  min-height:100vh;
  background:#f0f2f5;
  padding:10px;
}

.app{
  width:100%;
  max-width:520px;
  display:flex;
  flex-direction:column;
  gap:10px;
}

.top{
  display:flex;
  justify-content:space-between;
  font-weight:bold;
  font-size:18px;
}

.main{
  background:white;
  padding:12px;
  border-radius:16px;
  display:flex;
  flex-direction:column;
  gap:10px;
}

#map-wrap{
  border-radius:10px;
  overflow:hidden;
  background:#cce8f4;
  cursor:default;
  user-select:none;
}

#map{ display:block; }

.question{
  text-align:center;
  font-size:20px;
  font-weight:900;
  min-height:28px;
}

.num-buttons{
  display:grid;
  grid-template-columns:1fr 1fr 1fr 1fr;
  gap:8px;
}

.num-btn{
  padding:14px 8px;
  font-size:22px;
  font-weight:900;
  border-radius:12px;
  background:#1a1a2e;
  border:2px solid #1a1a2e;
  color:white;
  cursor:pointer;
}

.num-btn:disabled{ opacity:0.4; cursor:default; }
.num-btn.good{ background:#00c853; border-color:#00c853; }
.num-btn.bad{  background:#d50000; border-color:#d50000; }

.controls{
  display:flex;
  gap:6px;
}

button.ctrl{
  flex:1;
  padding:10px;
  font-size:16px;
  border:none;
  border-radius:12px;
  background:#222;
  color:white;
  font-weight:bold;
  cursor:pointer;
}

button.ctrl:disabled{ background:#aaa; cursor:default; }
</style>
</head>
<body>

<div class="app">
  <div class="top">
    <div>✅ <span id="hits">0</span></div>
    <div>❌ <span id="misses">0</span></div>
  </div>
  <div class="main">
    <div id="map-wrap"><svg id="map"></svg></div>
    <div class="question" id="question">Chargement…</div>
    <div class="num-buttons">
      <button class="num-btn" id="btn0" disabled>1</button>
      <button class="num-btn" id="btn1" disabled>2</button>
      <button class="num-btn" id="btn2" disabled>3</button>
      <button class="num-btn" id="btn3" disabled>4</button>
    </div>
    <div class="controls">
      <button class="ctrl" id="start" disabled>Jouer</button>
      <button class="ctrl" id="repeat">🔊</button>
    </div>
  </div>
</div>

// ── D3 setup ─────────────────────────────────────────────────────────────────
const W = Math.min(window.innerWidth - 24, 520);
const H = Math.round(W * 0.58);

document.getElementById("map").setAttribute("width",  W);
document.getElementById("map").setAttribute("height", H);

const projection = d3.geoNaturalEarth1()
  .scale(W / 6.3)
  .translate([W / 2, H / 2]);

const path = d3.geoPath().projection(projection);
const svg  = d3.select("#map");
const g    = svg.append("g");

let currentK = 1;

const zoomBeh = d3.zoom()
  .scaleExtent([1, 60])
  .on("zoom", e => {
    g.attr("transform", e.transform);
    currentK = e.transform.k;
    g.selectAll(".marker-circle")
      .attr("r", markerR())
      .attr("stroke-width", 1.5 / currentK);
    g.selectAll(".marker-text")
      .attr("font-size", markerFs());
  });

svg.call(zoomBeh).on("dblclick.zoom", null);

function markerR()  { return Math.max(3, 11 / currentK); }
function markerFs() { return Math.max(3.5, 8 / currentK); }

// ── State ────────────────────────────────────────────────────────────────────
let featureById  = {};
let availableIds = [];
let round = null;
let lock  = false;
let hits  = 0, misses = 0;

// ── TTS ──────────────────────────────────────────────────────────────────────
let voices = [], voicesReady = false;
function loadVoices(){ voices = speechSynthesis.getVoices(); if(voices.length) voicesReady = true; }
speechSynthesis.onvoiceschanged = loadVoices;
loadVoices();

function speak(text){
  if(!voicesReady) return;
  speechSynthesis.cancel();
  const u = new SpeechSynthesisUtterance(text);
  const fr = voices.find(v => v.lang.startsWith("fr"));
  if(fr) u.voice = fr;
  u.lang = "fr-FR";
  u.rate = 0.9;
  speechSynthesis.speak(u);
}

// ── Helpers ──────────────────────────────────────────────────────────────────
function shuffle(a){ return [...a].sort(() => Math.random() - 0.5); }

function zoomToAll(ids){
  let minX = Infinity, minY = Infinity, maxX = -Infinity, maxY = -Infinity;
  ids.forEach(id => {
    const [[x0,y0],[x1,y1]] = path.bounds(featureById[id]);
    minX = Math.min(minX, x0);
    minY = Math.min(minY, y0);
    maxX = Math.max(maxX, x1);
    maxY = Math.max(maxY, y1);
  });
  const dx = maxX - minX;
  const dy = maxY - minY;
  const scale = Math.min(14, 0.80 / Math.max(dx / W, dy / H));
  const cx = (minX + maxX) / 2;
  const cy = (minY + maxY) / 2;
  svg.transition().duration(800)
    .call(zoomBeh.transform,
      d3.zoomIdentity.translate(W/2, H/2).scale(scale).translate(-cx, -cy));
}

function placeMarkers(ids){
  g.selectAll(".marker").remove();
  ids.forEach((id, i) => {
    const [cx, cy] = path.centroid(featureById[id]);
    if(isNaN(cx) || isNaN(cy)) return;
    const num = i + 1;
    const grp = g.append("g")
      .attr("class", "marker")
      .style("cursor", "pointer")
      .on("click", () => handleAnswer(id, i));

    grp.append("circle")
      .attr("class", "marker-circle")
      .attr("cx", cx).attr("cy", cy)
      .attr("r", markerR())
      .attr("fill", "#1a1a2e")
      .attr("stroke", "white")
      .attr("stroke-width", 1.5 / currentK);

    grp.append("text")
      .attr("class", "marker-text")
      .attr("x", cx).attr("y", cy)
      .attr("text-anchor", "middle")
      .attr("dominant-baseline", "central")
      .attr("fill", "white")
      .attr("font-size", markerFs())
      .attr("font-weight", "bold")
      .style("pointer-events", "none")
      .text(num);
  });
}

// ── Answer handling ───────────────────────────────────────────────────────────
function handleAnswer(id, btnIdx){
  if(lock) return;
  const btn = document.getElementById("btn" + btnIdx);

  if(id === round.targetId){
    lock = true;
    hits++;
    document.getElementById("hits").textContent = hits;
    g.selectAll(".country").filter(d => +d.id === id).attr("fill","#00c853");
    btn.classList.add("good");
    document.getElementById("question").textContent = "✓ " + COUNTRIES[id].name;
    speak(COUNTRIES[id].name);
    setTimeout(nextRound, 1200);
  } else {
    misses++;
    document.getElementById("misses").textContent = misses;
    speak(COUNTRIES[id].name);
    g.selectAll(".country").filter(d => +d.id === id).attr("fill","#d50000");
    btn.classList.add("bad");
    setTimeout(() => {
      g.selectAll(".country").filter(d => +d.id === id).attr("fill","#ddd8f5");
      btn.classList.remove("bad");
    }, 400);
  }
}

// ── Round ─────────────────────────────────────────────────────────────────────
function nextRound(){
  lock = false;

  const targetId = availableIds[Math.floor(Math.random() * availableIds.length)];
  const info = COUNTRIES[targetId];

  const sameR  = availableIds.filter(id => id !== targetId && COUNTRIES[id].r === info.r);
  const pool   = sameR.length >= 3 ? sameR : availableIds.filter(id => id !== targetId);
  const wrongIds = shuffle(pool).slice(0, 3);
  const allIds   = shuffle([targetId, ...wrongIds]);

  round = {targetId, allIds};

  // Reset map colours
  g.selectAll(".country")
    .attr("fill",         "#f5f5f0")
    .attr("stroke",       "#aaa")
    .attr("stroke-width", 0.3);

  // Highlight the 4 candidates
  allIds.forEach(id => {
    g.selectAll(".country").filter(d => +d.id === id)
      .attr("fill", "#ddd8f5")
      .attr("stroke", "#888")
      .attr("stroke-width", 0.6);
  });

  // Wire up number buttons
  for(let i = 0; i < 4; i++){
    const btn = document.getElementById("btn" + i);
    btn.disabled = false;
    btn.className = "num-btn";
    btn.onclick = () => handleAnswer(allIds[i], i);
  }

  placeMarkers(allIds);
  zoomToAll(allIds);

  document.getElementById("question").textContent = "Où est : " + info.name + " ?";
  setTimeout(() => speak(info.name), 900);
}

// ── Init ──────────────────────────────────────────────────────────────────────
async function init(){
  const world = await d3.json(
    "https://cdn.jsdelivr.net/npm/world-atlas@2/countries-110m.json"
  );
  const geo = topojson.feature(world, world.objects.countries);

  geo.features.forEach(f => {
    if(COUNTRIES[+f.id]) featureById[+f.id] = f;
  });

  availableIds = Object.keys(COUNTRIES).map(Number).filter(id => featureById[id]);

  g.selectAll(".country")
    .data(geo.features)
    .join("path")
    .attr("class",        "country")
    .attr("d",            path)
    .attr("fill",         "#f5f5f0")
    .attr("stroke",       "#aaa")
    .attr("stroke-width", 0.3);

  document.getElementById("question").textContent = "Prêt !";
  document.getElementById("start").disabled = false;
}

document.getElementById("start").onclick = () => {
  speechSynthesis.resume();
  nextRound();
};

document.getElementById("repeat").onclick = () => {
  speechSynthesis.resume();
  if(round) speak(COUNTRIES[round.targetId].name);
};

init();
</script>
