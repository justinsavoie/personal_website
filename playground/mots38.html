<!doctype html>
<html lang="fr">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>La Cible de Ballons</title>
<style>
* {
  box-sizing: border-box;
  margin: 0;
  padding: 0;
}

html, body {
  height: 100%;
  margin: 0;
  padding: 0;
  overflow: hidden;
}

body {
  font-family: system-ui, -apple-system, sans-serif;
  display: flex;
  justify-content: center;
  align-items: center;
  background: #bae6fd; /* Light blue sky */
  color: #0f172a;
  touch-action: manipulation;
}

.app {
  width: 100%;
  max-width: 420px;
  height: 100%;
  padding: 12px;
  display: flex;
  flex-direction: column;
  gap: 10px;
  position: relative;
}

/* 📊 Header */
.top-bar {
  display: flex;
  justify-content: space-between;
  align-items: center;
  font-weight: 800;
  font-size: 18px;
  background: rgba(255, 255, 255, 0.9);
  padding: 10px 14px;
  border-radius: 14px;
  box-shadow: 0 4px 6px rgba(0,0,0,0.05);
  z-index: 20;
}

.stats {
  display: flex;
  gap: 16px;
}

/* ☁️ Target Cloud Panel */
.cloud-panel {
  background: white;
  border-radius: 24px;
  padding: 16px;
  text-align: center;
  box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
  border: 4px solid #38bdf8;
  display: flex;
  flex-direction: column;
  gap: 6px;
  z-index: 20;
  transition: transform 0.2s, border-color 0.2s;
}

.cloud-panel.shake {
  animation: shakeCloud 0.15s ease-in-out infinite;
  border-color: #ef4444;
}

@keyframes shakeCloud {
  0%, 100% { transform: translateX(0); }
  25% { transform: translateX(-6px); }
  75% { transform: translateX(6px); }
}

.target-title {
  font-size: 15px;
  font-weight: 900;
  color: #64748b;
  text-transform: uppercase;
  letter-spacing: 0.5px;
}

.target-val {
  font-size: 42px;
  font-weight: 900;
  color: #0284c7;
  line-height: 1;
}

.sum-val {
  font-size: 26px;
  font-weight: 800;
  color: #0f172a;
}

/* 🎈 Floating Balloon Board */
.play-area {
  flex: 1;
  position: relative;
  background: linear-gradient(to bottom, rgba(255,255,255,0) 0%, rgba(255,255,255,0.2) 100%);
  border-radius: 20px;
  overflow: hidden;
  z-index: 10;
}

/* 🎈 Balloon styling */
.balloon {
  position: absolute;
  top: 100%;
  width: 65px;
  height: 78px;
  border-radius: 50% 50% 50% 50% / 40% 40% 60% 60%;
  cursor: pointer;
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  color: white;
  font-size: 22px;
  font-weight: 900;
  animation: floatUp linear forwards;
  box-shadow: inset -6px -6px 0 rgba(0,0,0,0.18), 0 6px 10px rgba(0,0,0,0.1);
  user-select: none;
}

.balloon::after {
  content: '';
  position: absolute;
  bottom: -6px;
  left: 50%;
  transform: translateX(-50%);
  width: 0;
  height: 0;
  border-left: 6px solid transparent;
  border-right: 6px solid transparent;
  border-bottom: 6px solid rgba(0,0,0,0.2);
}

.balloon-string {
  position: absolute;
  bottom: -35px;
  left: 50%;
  width: 2px;
  height: 35px;
  background: rgba(0, 0, 0, 0.2);
}

/* Color codes */
.balloon-10 {
  background: #ef4444; /* Red */
  border: 2px solid #b91c1c;
}
.balloon-5 {
  background: #f59e0b; /* Amber */
  border: 2px solid #b45309;
}
.balloon-1 {
  background: #10b981; /* Emerald */
  border: 2px solid #047857;
}

@keyframes floatUp {
  0% {
    top: 100%;
    transform: translateX(0) rotate(0deg);
  }
  50% {
    transform: translateX(25px) rotate(6deg);
  }
  100% {
    top: -120px;
    transform: translateX(-25px) rotate(-6deg);
  }
}

/* Burst explosion particle */
.pop-effect {
  position: absolute;
  font-size: 48px;
  animation: popFade 0.3s ease-out forwards;
  pointer-events: none;
  z-index: 15;
}

@keyframes popFade {
  0% { transform: scale(0.5) rotate(0deg); opacity: 1; }
  100% { transform: scale(1.6) rotate(20deg); opacity: 0; }
}

/* 🎮 Controls Footer */
.controls {
  display: flex;
  gap: 8px;
  z-index: 20;
}

button.ctrl {
  flex: 1;
  padding: 12px;
  font-size: 18px;
  border: none;
  border-radius: 12px;
  background: #0f172a;
  color: white;
  font-weight: bold;
  cursor: pointer;
  box-shadow: 0 4px 0 #020617;
  border: 1px solid #1e293b;
}

button.ctrl:active {
  transform: translateY(2px);
  box-shadow: 0 2px 0 #020617;
}

@media (max-height: 620px) {
  .app {
    padding: 8px;
    gap: 6px;
  }
  .cloud-panel {
    padding: 10px;
  }
  .target-val {
    font-size: 32px;
  }
  .sum-val {
    font-size: 20px;
  }
  .balloon {
    width: 52px;
    height: 62px;
    font-size: 16px;
  }
}
</style>
</head>
<body>

<div class="app">
  <div class="top-bar">
    <div class="stats">
      <div>🎈 Niv. <span id="level">1</span></div>
      <div>⭐ <span id="stars">0</span></div>
    </div>
    <div id="reset-btn" style="cursor:pointer; font-size:15px;" onclick="resetSum()">🔄</div>
  </div>

  <div class="cloud-panel" id="cloud">
    <div class="target-title">Cible</div>
    <div class="target-val" id="target-box">10</div>
    <div class="sum-val">Somme : <span id="sum-box">0</span></div>
  </div>

  <div class="play-area" id="play-area"></div>

  <div class="controls">
    <button class="ctrl" id="start">Jouer</button>
    <button class="ctrl" id="repeat" style="max-width: 70px;">🔊</button>
  </div>
</div>

<script>
// ⚙️ Targets levels configuration
const LEVELS = [
  { t: 10 },
  { t: 15 },
  { t: 12 },
  { t: 20 },
  { t: 23 },
  { t: 30 },
  { t: 35 },
  { t: 42 },
  { t: 55 },
  { t: 60 }
];

let levelIndex = 0;
let stars = 0;
let currentSum = 0;
let lock = false;
let voices = [];
let ready = false;
let audioCtx = null;
let spawnInterval = null;

// 🔊 Text-To-Speech Loading
function loadVoices() {
  voices = speechSynthesis.getVoices();
  if (voices.length > 0) ready = true;
}
speechSynthesis.onvoiceschanged = loadVoices;
loadVoices();

function speak(text) {
  if (!ready) return;
  speechSynthesis.cancel();
  const utter = new SpeechSynthesisUtterance(text);
  const frVoice = voices.find(v => v.lang.startsWith("fr"));
  if (frVoice) utter.voice = frVoice;
  utter.lang = "fr-FR";
  utter.rate = 0.95;
  speechSynthesis.speak(utter);
}

// 🎹 Web Audio Sound Synthesizer
function getAudioContext() {
  if (!audioCtx) {
    audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  }
  return audioCtx;
}

function playSound(freqs, type, duration, slide = false) {
  try {
    const ctx = getAudioContext();
    if (ctx.state === 'suspended') ctx.resume();
    const osc = ctx.createOscillator();
    const gain = ctx.createGain();
    
    osc.type = type;
    const t = ctx.currentTime;
    if (slide && freqs.length > 1) {
      osc.frequency.setValueAtTime(freqs[0], t);
      osc.frequency.exponentialRampToValueAtTime(freqs[1], t + duration);
    } else {
      osc.frequency.setValueAtTime(freqs[0], t);
    }
    
    gain.gain.setValueAtTime(0.12, t);
    gain.gain.exponentialRampToValueAtTime(0.001, t + duration);
    
    osc.connect(gain);
    gain.connect(ctx.destination);
    
    osc.start(t);
    osc.stop(t + duration + 0.05);
  } catch (e) {
    console.log("Audio API blocked");
  }
}

function sfxPop() { playSound([500, 1100], 'sine', 0.08, true); }
function sfxWrong() { playSound([220, 100], 'sawtooth', 0.5, true); }
function sfxCorrect() {
  const notes = [523.25, 659.25, 783.99, 1046.50];
  notes.forEach((f, i) => {
    setTimeout(() => playSound([f], 'sine', 0.35), i * 110);
  });
}

// 🕹️ Game Core
function restartGame() {
  levelIndex = 0;
  stars = 0;
  document.getElementById("stars").textContent = stars;
  loadLevel();
}

function resetSum() {
  if (lock) return;
  currentSum = 0;
  document.getElementById("sum-box").textContent = currentSum;
  // Pop all active balloons
  document.querySelectorAll(".balloon").forEach(b => b.remove());
  speak("Remis à zéro.");
}

function loadLevel() {
  lock = false;
  currentSum = 0;
  
  const level = LEVELS[levelIndex];
  document.getElementById("level").textContent = levelIndex + 1;
  document.getElementById("target-box").textContent = level.t;
  document.getElementById("sum-box").textContent = currentSum;

  document.getElementById("cloud").className = "cloud-panel";

  // Clear existing balloons
  document.querySelectorAll(".balloon").forEach(b => b.remove());

  // Restart spawning loop
  clearInterval(spawnInterval);
  spawnInterval = setInterval(spawnBalloon, 1400);

  setTimeout(speakPrompt, 800);
}

function speakPrompt() {
  const level = LEVELS[levelIndex];
  speak(`Éclate les ballons pour faire ${level.t} !`);
}

// 🎈 Balloon Spawning Engine
function spawnBalloon() {
  if (lock) return;
  const level = LEVELS[levelIndex];
  const diff = level.t - currentSum;

  if (diff <= 0) return;

  // 🧠 Intelligent Spawner: Only spawn values that can fit!
  let pool = [1];
  if (diff >= 10) {
    pool = [10, 5, 1];
  } else if (diff >= 5) {
    pool = [5, 1];
  } else {
    pool = [1];
  }

  const val = pool[Math.floor(Math.random() * pool.length)];
  createBalloon(val);
}

function createBalloon(val) {
  const area = document.getElementById("play-area");
  const balloon = document.createElement("div");
  balloon.className = `balloon balloon-${val}`;
  
  // Random horizontal position (10% to 80% to avoid clipping edges)
  balloon.style.left = `${10 + Math.random() * 70}%`;
  
  // Random float speed (4.5s to 6s)
  balloon.style.animationDuration = `${4.5 + Math.random() * 1.5}s`;

  balloon.innerHTML = `<span>+${val}</span>`;

  // String
  const str = document.createElement("div");
  str.className = "balloon-string";
  balloon.appendChild(str);

  // Click handler
  balloon.onclick = (e) => {
    e.stopPropagation();
    popBalloon(balloon, val);
  };

  area.appendChild(balloon);

  // Auto clean-up when floats off screen
  setTimeout(() => {
    if (balloon.parentNode) balloon.parentNode.removeChild(balloon);
  }, 7000);
}

function popBalloon(balloon, val) {
  if (lock) return;

  sfxPop();
  
  // Explosion particle positioning
  const rect = balloon.getBoundingClientRect();
  const aRect = document.getElementById("play-area").getBoundingClientRect();
  
  const pop = document.createElement("div");
  pop.className = "pop-effect";
  pop.textContent = "💥";
  pop.style.left = `${rect.left - aRect.left + 8}px`;
  pop.style.top = `${rect.top - aRect.top + 10}px`;
  document.getElementById("play-area").appendChild(pop);

  if (balloon.parentNode) balloon.parentNode.removeChild(balloon);
  setTimeout(() => {
    if (pop.parentNode) pop.parentNode.removeChild(pop);
  }, 350);

  // Add sum
  currentSum += val;
  document.getElementById("sum-box").textContent = currentSum;

  const level = LEVELS[levelIndex];

  if (currentSum === level.t) {
    // 🏆 SUCCESS! Target met
    lock = true;
    clearInterval(spawnInterval);
    sfxCorrect();
    stars += 5;
    document.getElementById("stars").textContent = stars;

    speak(`Génial ! Tu as fait ${level.t} !`);

    // Clean remaining balloons
    document.querySelectorAll(".balloon").forEach(b => {
      setTimeout(() => b.remove(), 100);
    });

    // Advance
    setTimeout(() => {
      levelIndex++;
      if (levelIndex >= LEVELS.length) {
        speak("Incroyable ! Tu as terminé tous les ballons de la cible !");
        sfxCorrect();
        
        // Final retry UI
        document.getElementById("play-area").innerHTML = `
          <div style="display:flex; justify-content:center; align-items:center; height:100%;">
            <button class="ctrl" style="padding: 16px; width:80%; font-size:20px; background:#10b981;" onclick="restartGame()">
              🔄 Rejouer le jeu
            </button>
          </div>
        `;
      } else {
        loadLevel();
      }
    }, 2800);

  } else if (currentSum > level.t) {
    // ❌ OVERSHOOT! Reset target
    lock = true;
    sfxWrong();
    document.getElementById("cloud").classList.add("shake");
    speak("Oups ! C'est trop grand.");

    // Clear balloons and reset to 0
    setTimeout(() => {
      document.getElementById("cloud").classList.remove("shake");
      currentSum = 0;
      document.getElementById("sum-box").textContent = currentSum;
      document.querySelectorAll(".balloon").forEach(b => b.remove());
      lock = false;
    }, 1500);

  } else {
    // Cumulative voice count!
    speak(`${currentSum}`);
  }
}

// Hook Page buttons
document.getElementById("start").onclick = () => {
  getAudioContext().resume();
  speechSynthesis.resume();
  loadLevel();
};

document.getElementById("repeat").onclick = () => {
  speechSynthesis.resume();
  speakPrompt();
};
</script>

</body>
</html>
