<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Garage des Véhicules</title>
    <style>
        body { margin:0; padding:20px; font-family:system-ui; background:#e8f5e9; display:flex; flex-direction:column; align-items:center; min-height:100vh; color:#1b3a2a; }
        .stats { font-size:18px; font-weight:800; margin-bottom:16px; }
        .question { font-size:24px; font-weight:900; text-align:center; margin-bottom:16px; min-height:34px; }
        .vehicle { width:150px; height:120px; border:none; border-radius:24px; background:white; font-size:64px; cursor:pointer; box-shadow:0 6px 0 rgba(0,0,0,0.15); margin-bottom:18px; }
        .vehicle:active, .garage:active { transform:scale(0.96); }
        .vehicle.selected { outline:6px solid #ffeb3b; }
        .garages { display:grid; grid-template-columns:1fr 1fr; gap:14px; width:100%; max-width:430px; }
        .garage { border:4px solid transparent; border-radius:20px; min-height:108px; background:white; cursor:pointer; display:flex; flex-direction:column; align-items:center; justify-content:center; box-shadow:0 4px 8px rgba(0,0,0,0.12); font-weight:900; color:#263238; }
        .garage-icon { font-size:34px; margin-bottom:5px; }
        .garage.good { border-color:#00c853; }
        .garage.bad { border-color:#d50000; }
        .btn { margin-top:26px; padding:15px 40px; font-size:18px; font-weight:800; background:#222; color:white; border:none; border-radius:12px; cursor:pointer; }
    </style>
</head>
<body>
    <div class="stats">✅ <span id="hits">0</span> | ❌ <span id="misses">0</span></div>
    <div class="question" id="question">Appuie sur Jouer !</div>
    <button class="vehicle" id="vehicle">🚗</button>
    <div class="garages" id="garages"></div>
    <button class="btn" id="start">Jouer</button>

    <script>
        const GARAGES = [
            {id:'voiture', name:'Voitures', icon:'🚗'},
            {id:'camion', name:'Camions', icon:'🚚'},
            {id:'secours', name:'Secours', icon:'🚨'},
            {id:'bus', name:'Autobus', icon:'🚌'}
        ];
        const VEHICLES = [
            {emoji:'🚗', name:'la voiture', garage:'voiture'},
            {emoji:'🚕', name:'le taxi', garage:'voiture'},
            {emoji:'🏎️', name:'la voiture de course', garage:'voiture'},
            {emoji:'🚚', name:'le camion', garage:'camion'},
            {emoji:'🚛', name:'le gros camion', garage:'camion'},
            {emoji:'🚒', name:'le camion de pompier', garage:'secours'},
            {emoji:'🚑', name:"l'ambulance", garage:'secours'},
            {emoji:'🚓', name:'la voiture de police', garage:'secours'},
            {emoji:'🚌', name:"l'autobus", garage:'bus'},
            {emoji:'🚎', name:'le trolleybus', garage:'bus'}
        ];
        let hits = 0, misses = 0, current = null, lock = false;

        function speak(text) {
            const u = new SpeechSynthesisUtterance(text);
            u.lang = 'fr-FR'; u.rate = 0.9;
            speechSynthesis.cancel(); speechSynthesis.speak(u);
        }

        function nextRound() {
            lock = false;
            current = VEHICLES[Math.floor(Math.random() * VEHICLES.length)];
            document.getElementById('vehicle').textContent = current.emoji;
            document.getElementById('vehicle').classList.add('selected');
            document.getElementById('question').textContent = `Dans quel garage va ${current.name} ?`;
            document.getElementById('start').style.display = 'none';
            speak(`Dans quel garage va ${current.name} ?`);
            renderGarages();
        }

        function renderGarages() {
            const box = document.getElementById('garages');
            box.innerHTML = '';
            GARAGES.forEach(garage => {
                const btn = document.createElement('button');
                btn.className = 'garage';
                btn.innerHTML = `<span class="garage-icon">${garage.icon}</span><span>${garage.name}</span>`;
                btn.onclick = () => pick(btn, garage);
                box.appendChild(btn);
            });
        }

        function pick(btn, garage) {
            if (lock) return;
            if (garage.id === current.garage) {
                lock = true;
                hits++;
                document.getElementById('hits').textContent = hits;
                btn.classList.add('good');
                document.getElementById('vehicle').classList.remove('selected');
                speak('Bravo, dans le bon garage !');
                setTimeout(nextRound, 1400);
            } else {
                misses++;
                document.getElementById('misses').textContent = misses;
                btn.classList.add('bad');
                speak('Non, essaie un autre garage.');
                setTimeout(() => btn.classList.remove('bad'), 600);
            }
        }

        document.getElementById('vehicle').onclick = () => {
            if (current) speak(current.name);
        };
        document.getElementById('start').onclick = () => {
            speechSynthesis.resume();
            nextRound();
        };
        renderGarages();
    </script>
</body>
</html>
