<!doctype html>
<html lang="fr">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Fusée des mots-nombres</title>

<style>
body{
  margin:0;
  font-family:system-ui;
  min-height:100vh;
  background:radial-gradient(circle at 20% 10%, #1e2a5e 0%, #0b1026 60%);
  display:flex;
  justify-content:center;
  align-items:center;
  touch-action:manipulation;
}

.app{
  width:100%;
  max-width:430px;
  padding:14px;
  display:flex;
  flex-direction:column;
  gap:12px;
}

.top{
  display:flex;
  justify-content:space-between;
  font-weight:900;
  font-size:16px;
  color:#fff;
}

.card{
  background:white;
  border-radius:18px;
  padding:14px;
  display:flex;
  flex-direction:column;
  gap:12px;
  box-shadow:0 5px 16px rgba(0,0,0,0.35);
}

.track{
  height:220px;
  background:
    radial-gradient(2px 2px at 20px 30px, #fff, transparent),
    radial-gradient(2px 2px at 60px 90px, #fff, transparent),
    radial-gradient(1.5px 1.5px at 100px 40px, #fff, transparent),
    radial-gradient(2px 2px at 140px 150px, #fff, transparent),
    radial-gradient(1.5px 1.5px at 30px 180px, #fff, transparent),
    radial-gradient(2px 2px at 170px 60px, #fff, transparent),
    linear-gradient(180deg, #0b1026 0%, #1e2a5e 100%);
  border:6px solid #1e293b;
  border-radius:22px;
  position:relative;
  overflow:hidden;
}

.spacezone{
  position:absolute;
  top:0;
  left:0;
  right:0;
  height:44px;
  background:linear-gradient(180deg, rgba(255,255,255,0.18), transparent);
  border-bottom:2px dashed rgba(255,255,255,0.4);
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:12px;
  color:#fff;
  font-weight:900;
  letter-spacing:1px;
}

.rocket{
  position:absolute;
  left:calc(50% - 27px);
  bottom:6px;
  font-size:54px;
  transition:bottom 0.4s ease;
  filter:drop-shadow(0 4px 3px rgba(0,0,0,0.4));
}

.progress{
  display:flex;
  justify-content:space-between;
  font-weight:900;
  font-size:16px;
}

.bar{
  height:20px;
  border-radius:999px;
  background:#cbd5e1;
  overflow:hidden;
}

.fill{
  height:100%;
  width:0%;
  background:linear-gradient(90deg,#818cf8,#4338ca);
  transition:width 0.4s ease;
}

.prompt{
  text-align:center;
  font-size:38px;
  font-weight:900;
  letter-spacing:1px;
  min-height:60px;
  display:flex;
  align-items:center;
  justify-content:center;
}

.grid{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:10px;
}

button{
  border:none;
  border-radius:14px;
  background:#222;
  color:white;
  font-weight:900;
  cursor:pointer;
  box-shadow:0 4px 0 rgba(0,0,0,0.16);
}

button:active{
  transform:scale(0.96);
}

.choice{
  min-height:66px;
  font-size:24px;
  background:#fff;
  color:#111;
  border:3px solid #111;
}

.controls{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:8px;
}

.control{
  min-height:54px;
  font-size:18px;
}

.good{
  background:#16a34a !important;
  color:white !important;
  border-color:#16a34a !important;
}

.bad{
  background:#dc2626 !important;
  color:white !important;
  border-color:#dc2626 !important;
}

.message{
  min-height:28px;
  text-align:center;
  font-size:18px;
  font-weight:900;
}

.badges{
  display:flex;
  justify-content:center;
  gap:8px;
  font-size:26px;
}

.badge{
  opacity:0.25;
  filter:grayscale(1);
  transition:opacity 0.3s ease, filter 0.3s ease;
}

.badge.owned{
  opacity:1;
  filter:none;
}
</style>
</head>

<body>
<div class="app">
  <div class="top">
    <div>⭐ Série: <span id="streak">0</span></div>
    <div>🪐 Badges: <span id="badgeCount">0</span>/6</div>
  </div>

  <div class="card">
    <div class="track">
      <div class="spacezone">ESPACE</div>
      <div class="rocket" id="rocket">🚀</div>
    </div>

    <div class="progress">
      <span>Départ</span>
      <span><span id="position">0</span> / <span id="finish">10</span></span>
      <span>Espace</span>
    </div>
    <div class="bar"><div class="fill" id="fill"></div></div>

    <div class="prompt" id="prompt">?</div>
    <div class="message" id="message">Réponds pour faire décoller la fusée !</div>
    <div class="grid" id="grid"></div>
    <div class="badges" id="badgesRow"></div>

    <div class="controls">
      <button class="control" id="start">Jouer</button>
      <button class="control" id="repeat">🔊</button>
    </div>
  </div>
</div>

<script>
const FINISH = 10;
const BADGES = [
  {emoji:"🪐", name:"Saturne"},
  {emoji:"🌍", name:"Terre"},
  {emoji:"🌕", name:"Lune"},
  {emoji:"☄️", name:"Comète"},
  {emoji:"🔴", name:"Mars"},
  {emoji:"🟠", name:"Jupiter"}
];

const WORDS = [
  {emoji:"🚀", word:"fusée"},
  {emoji:"🌙", word:"lune"},
  {emoji:"⭐", word:"étoile"},
  {emoji:"🪐", word:"planète"},
  {emoji:"👨‍🚀", word:"astronaute"},
  {emoji:"☀️", word:"soleil"},
  {emoji:"☄️", word:"comète"},
  {emoji:"🌍", word:"terre"},
  {emoji:"☁️", word:"nuage"},
  {emoji:"🛰️", word:"satellite"}
];

let streak = 0;
let hits = 0;
let misses = 0;
let position = 0;
let roundIndex = 0;
let round = null;
let lock = false;
let voices = [];

const streakEl = document.getElementById("streak");
const badgeCountEl = document.getElementById("badgeCount");
const positionEl = document.getElementById("position");
const fillEl = document.getElementById("fill");
const rocketEl = document.getElementById("rocket");
const promptEl = document.getElementById("prompt");
const messageEl = document.getElementById("message");
const grid = document.getElementById("grid");
const badgesRow = document.getElementById("badgesRow");

function shuffle(items){
  return [...items].sort(() => Math.random() - 0.5);
}

function loadVoices(){
  voices = speechSynthesis.getVoices();
}
speechSynthesis.onvoiceschanged = loadVoices;
loadVoices();

function speak(text){
  speechSynthesis.cancel();
  const utter = new SpeechSynthesisUtterance(text);
  const frVoice = voices.find(v => v.lang.startsWith("fr"));
  if(frVoice) utter.voice = frVoice;
  utter.lang = "fr-FR";
  utter.rate = 0.9;
  speechSynthesis.speak(utter);
}

function randInt(min, max){
  return Math.floor(Math.random() * (max - min + 1)) + min;
}

function getOwnedBadges(){
  try{
    return JSON.parse(localStorage.getItem("fusee_badges") || "[]");
  }catch(e){
    return [];
  }
}

function saveOwnedBadges(list){
  localStorage.setItem("fusee_badges", JSON.stringify(list));
}

function renderBadgesRow(){
  const owned = getOwnedBadges();
  badgesRow.innerHTML = "";
  BADGES.forEach(b => {
    const span = document.createElement("span");
    span.className = "badge" + (owned.includes(b.name) ? " owned" : "");
    span.textContent = b.emoji;
    span.title = b.name;
    badgesRow.appendChild(span);
  });
  badgeCountEl.textContent = owned.length;
}

function awardBadge(){
  const owned = getOwnedBadges();
  const available = BADGES.filter(b => !owned.includes(b.name));
  if(available.length === 0){
    messageEl.textContent = "Collection complète ! Bravo explorateur !";
    speak("Bravo, tu as toute la collection !");
    return;
  }
  const picked = available[randInt(0, available.length - 1)];
  owned.push(picked.name);
  saveOwnedBadges(owned);
  renderBadgesRow();
  messageEl.textContent = `Nouveau badge débloqué : ${picked.emoji} ${picked.name} !`;
  speak(`Bravo ! Tu as débloqué le badge ${picked.name} !`);
}

function updateTrack(){
  const pct = Math.min(100, (position / FINISH) * 100);
  positionEl.textContent = position;
  fillEl.style.width = `${pct}%`;
  const maxBottom = 150;
  rocketEl.style.bottom = `${6 + (maxBottom * pct / 100)}px`;
}

function uniqueWrongNumbers(correct, count){
  const wrong = new Set();
  while(wrong.size < count){
    const candidate = correct + randInt(-10, 10);
    if(candidate !== correct && candidate >= 0) wrong.add(candidate);
  }
  return [...wrong];
}

function makeAdditionRound(){
  const a = randInt(0, 12);
  const b = randInt(0, 9);
  const pair = Math.random() < 0.5 ? [a, b] : [b, a];
  const left = pair[0];
  const right = pair[1];
  const answer = left + right;
  round = {
    type: "addition",
    answer,
    choices: shuffle([answer, ...uniqueWrongNumbers(answer, 3)])
  };
  promptEl.textContent = `${left} + ${right} = ?`;
  setTimeout(() => speak(`${left} plus ${right}`), 300);
}

function makeWordRound(){
  const correct = WORDS[randInt(0, WORDS.length - 1)];
  const pool = WORDS.filter(w => w.word !== correct.word);
  const wrongs = shuffle(pool).slice(0, 3).map(w => w.word);
  round = {
    type: "word",
    answer: correct.word,
    choices: shuffle([correct.word, ...wrongs])
  };
  promptEl.textContent = correct.emoji;
  setTimeout(() => speak("Quel est ce mot ?"), 300);
}

function makeRound(){
  lock = false;
  if(roundIndex % 2 === 0){
    makeAdditionRound();
  } else {
    makeWordRound();
  }
  roundIndex++;
  messageEl.textContent = "3 bonnes réponses de suite = boost !";
  renderChoices();
}

function renderChoices(){
  grid.innerHTML = "";
  round.choices.forEach(value => {
    const btn = document.createElement("button");
    btn.className = "choice";
    btn.textContent = value;
    btn.onclick = () => choose(value, btn);
    grid.appendChild(btn);
  });
}

function choose(value, btn){
  if(lock || !round) return;
  if(value === round.answer){
    lock = true;
    hits++;
    streak++;
    streakEl.textContent = streak;
    btn.classList.add("good");

    let gain = 1;
    let boosted = false;
    if(streak > 0 && streak % 3 === 0){
      gain = 2;
      boosted = true;
    }
    position += gain;
    updateTrack();

    if(position >= FINISH){
      position = 0;
      updateTrack();
      awardBadge();
      setTimeout(makeRound, 1600);
    } else if(boosted){
      messageEl.textContent = "Boost fusée ! 🔥 Tu avances de 2 !";
      speak("Boost ! Bravo !");
      setTimeout(makeRound, 1000);
    } else {
      messageEl.textContent = "Bravo ! Tu avances.";
      speak("Bravo !");
      setTimeout(makeRound, 900);
    }
  } else {
    misses++;
    streak = 0;
    streakEl.textContent = streak;
    btn.classList.add("bad");
    messageEl.textContent = "Oups ! La série recommence.";
    speak("Oups, essaie encore.");
    setTimeout(() => btn.classList.remove("bad"), 450);
    lock = false;
  }
}

function resetGame(){
  streak = 0;
  hits = 0;
  misses = 0;
  position = 0;
  roundIndex = 0;
  streakEl.textContent = streak;
  updateTrack();
  makeRound();
}

document.getElementById("start").onclick = () => {
  speechSynthesis.resume();
  resetGame();
};

document.getElementById("repeat").onclick = () => {
  speechSynthesis.resume();
  if(!round) return;
  if(round.type === "addition"){
    speak(promptEl.textContent.replace("+", "plus").replace("=", "égal").replace("?", ""));
  } else {
    speak("Quel est ce mot ?");
  }
};

document.getElementById("finish").textContent = FINISH;
renderBadgesRow();
updateTrack();
</script>
</body>
</html>
