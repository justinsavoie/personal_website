<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Chess AI - Tap & Drag Fixed</title>
    <link rel="stylesheet" href="https://unpkg.com/@chrisoakman/chessboardjs@1.0.0/dist/chessboard-1.0.0.min.css">
    <style>
        body { background: #2c3e50; color: white; font-family: sans-serif; text-align: center; margin: 0; padding: 5px; touch-action: manipulation; }
        #board { width: 98vw; max-width: 600px; margin: 0 auto; border: 4px solid #34495e; }
        .status { margin: 10px; font-size: 1.2em; color: #f1c40f; font-weight: bold; height: 1.5em; }
        button { padding: 15px 30px; font-size: 1.1em; background: #e67e22; color: white; border: none; border-radius: 8px; cursor: pointer; margin: 10px; -webkit-tap-highlight-color: transparent; }
        
        /* Clearer highlighting */
        .highlight-square { 
            box-shadow: inset 0 0 5px 5px rgba(241, 196, 15, 0.8) !important;
        }
    </style>
</head>
<body>

    <div class="status" id="status">White to move</div>
    <div id="board"></div>
    <button onclick="resetGame()">New Game</button>

    <script src="https://code.jquery.com/jquery-3.5.1.min.js"></script>
    <script src="https://code.jquery.com/ui/1.12.1/jquery-ui.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jqueryui-touch-punch/0.2.3/jquery.ui.touch-punch.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/chess.js/0.10.3/chess.min.js"></script>
    <script src="https://unpkg.com/@chrisoakman/chessboardjs@1.0.0/dist/chessboard-1.0.0.min.js"></script>

    <script>
        var board = null;
        var game = new Chess();
        var sourceSquare = null;

        var weights = { p: 10, n: 30, b: 30, r: 50, q: 90, k: 900 };

        function evaluateBoard(game) {
            var total = 0;
            game.board().forEach(row => {
                row.forEach(p => { if (p) total += (p.color === 'w' ? weights[p.type] : -weights[p.type]); });
            });
            return total;
        }

        function minimax(depth, game, alpha, beta, isMax) {
            if (depth === 0) return evaluateBoard(game);
            var moves = game.moves();
            var best = isMax ? -9999 : 9999;
            for (var i = 0; i < moves.length; i++) {
                game.move(moves[i]);
                var val = minimax(depth - 1, game, alpha, beta, !isMax);
                game.undo();
                if (isMax) { best = Math.max(best, val); alpha = Math.max(alpha, best); }
                else { best = Math.min(best, val); beta = Math.min(beta, best); }
                if (beta <= alpha) break;
            }
            return best;
        }

        function makeBestMove() {
            var moves = game.moves();
            if (game.game_over()) return;
            moves.sort(() => 0.5 - Math.random());
            var bestMove = null, bestValue = 9999; 
            for (var i = 0; i < moves.length; i++) {
                game.move(moves[i]);
                var val = minimax(2, game, -10000, 10000, true);
                game.undo();
                if (val < bestValue) { bestValue = val; bestMove = moves[i]; }
            }
            game.move(bestMove);
            board.position(game.fen());
            updateStatus();
        }

        function removeHighlights() {
            $('#board .square-55d63').removeClass('highlight-square');
        }

        // Logic for both Click and Tap
        function handleSquareSelection(square) {
            var piece = game.get(square);

            if (sourceSquare === null) {
                // First selection
                if (piece && piece.color === game.turn()) {
                    sourceSquare = square;
                    removeHighlights();
                    $('.square-' + square).addClass('highlight-square');
                }
            } else {
                // Second selection - attempt move
                var move = game.move({ from: sourceSquare, to: square, promotion: 'q' });
                
                if (move === null) {
                    // If illegal, but clicked another of own pieces, switch selection
                    if (piece && piece.color === game.turn()) {
                        sourceSquare = square;
                        removeHighlights();
                        $('.square-' + square).addClass('highlight-square');
                    } else {
                        sourceSquare = null;
                        removeHighlights();
                    }
                } else {
                    // Legal move
                    sourceSquare = null;
                    removeHighlights();
                    board.position(game.fen());
                    updateStatus();
                    window.setTimeout(makeBestMove, 250);
                }
            }
        }

        function onDrop(source, target) {
            var move = game.move({ from: source, to: target, promotion: 'q' });
            if (move === null) return 'snapback';
            sourceSquare = null;
            removeHighlights();
            updateStatus();
            window.setTimeout(makeBestMove, 250);
        }

        function updateStatus() {
            var status = game.in_checkmate() ? "Checkmate!" : game.in_draw() ? "Draw!" : (game.turn() === 'w' ? "Your turn" : "AI thinking...");
            $('#status').html(status);
        }

        function resetGame() {
            game.reset();
            board.start();
            sourceSquare = null;
            removeHighlights();
            updateStatus();
        }

        board = Chessboard('board', {
            draggable: true,
            position: 'start',
            onDrop: onDrop,
            pieceTheme: 'https://chessboardjs.com/img/chesspieces/wikipedia/{piece}.png',
            onSnapEnd: function() { board.position(game.fen()); }
        });

        // BINDING TO BOTH MOUSE AND TOUCH
        // Using 'pointerdown' covers both mouse click and finger tap efficiently
        $('#board').on('pointerdown', '.square-55d63', function(e) {
            var square = $(this).attr('data-square');
            handleSquareSelection(square);
        });

        updateStatus();
    </script>
</body>
</html>
