<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Pro Chess AI</title>
    <link rel="stylesheet" href="https://unpkg.com/@chrisoakman/chessboardjs@1.0.0/dist/chessboard-1.0.0.min.css">
    <style>
        body { background: #2c3e50; color: white; font-family: sans-serif; text-align: center; margin: 0; padding: 5px; overflow-x: hidden; }
        /* Larger Board */
        #board { width: 98vw; max-width: 600px; margin: 0 auto; border: 4px solid #34495e; border-radius: 4px; }
        .status { margin: 10px; font-size: 1.2em; color: #f1c40f; font-weight: bold; height: 1.5em; }
        button { padding: 15px 30px; font-size: 1.1em; background: #27ae60; color: white; border: none; border-radius: 8px; cursor: pointer; margin: 10px; }
        button:active { background: #1e8449; }
        /* Highlighting for click-to-move */
        .highlight-white { box-shadow: inset 0 0 3px 3px yellow; }
        .highlight-black { box-shadow: inset 0 0 3px 3px yellow; }
    </style>
</head>
<body>

    <div class="status" id="status">White to move</div>
    <div id="board"></div>
    <button onclick="resetGame()">New Game</button>

    <script src="https://code.jquery.com/jquery-3.5.1.min.js"></script>
    <script src="https://code.jquery.com/ui/1.12.1/jquery-ui.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jqueryui-touch-punch/0.2.3/jquery.ui.touch-punch.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/chess.js/0.10.3/chess.min.js"></script>
    <script src="https://unpkg.com/@chrisoakman/chessboardjs@1.0.0/dist/chessboard-1.0.0.min.js"></script>

    <script>
        var board = null;
        var game = new Chess();
        var $status = $('#status');
        var sourceSquare = null; // Tracks the first click for tap-to-move

        var weights = { p: 10, n: 30, b: 30, r: 50, q: 90, k: 900 };

        // --- AI LOGIC ---
        function evaluateBoard(game) {
            var total = 0;
            game.board().forEach(row => {
                row.forEach(p => { if (p) total += (p.color === 'w' ? weights[p.type] : -weights[p.type]); });
            });
            return total;
        }

        function minimax(depth, game, alpha, beta, isMax) {
            if (depth === 0) return evaluateBoard(game);
            var moves = game.moves();
            var best = isMax ? -9999 : 9999;
            for (var i = 0; i < moves.length; i++) {
                game.move(moves[i]);
                var val = minimax(depth - 1, game, alpha, beta, !isMax);
                game.undo();
                if (isMax) { best = Math.max(best, val); alpha = Math.max(alpha, best); }
                else { best = Math.min(best, val); beta = Math.min(beta, best); }
                if (beta <= alpha) break;
            }
            return best;
        }

        function makeBestMove() {
            var moves = game.moves();
            if (moves.length === 0) return;
            moves.sort(() => 0.5 - Math.random());
            var bestMove = null;
            var bestValue = 9999; 
            for (var i = 0; i < moves.length; i++) {
                game.move(moves[i]);
                var val = minimax(2, game, -10000, 10000, true);
                game.undo();
                if (val < bestValue) { bestValue = val; bestMove = moves[i]; }
            }
            game.move(bestMove);
            board.position(game.fen());
            updateStatus();
        }

        // --- INTERACTION LOGIC ---
        function removeHighlights() { $('#board .square-55d63').removeClass('highlight-white highlight-black'); }

        function onSquareClick(square) {
            // 1. If it's the second click (target square)
            if (sourceSquare) {
                var move = game.move({ from: sourceSquare, to: square, promotion: 'q' });
                removeHighlights();
                sourceSquare = null;

                if (move === null) {
                    // If illegal, check if they clicked another of their own pieces instead
                    onSquareClick(square); 
                    return;
                }
                
                board.position(game.fen());
                updateStatus();
                window.setTimeout(makeBestMove, 250);
                return;
            }

            // 2. If it's the first click
            var piece = game.get(square);
            if (piece && piece.color === game.turn()) {
                sourceSquare = square;
                $('#board .square-' + square).addClass('highlight-white');
            }
        }

        function onDrop(source, target) {
            removeHighlights();
            var move = game.move({ from: source, to: target, promotion: 'q' });
            if (move === null) return 'snapback';
            updateStatus();
            window.setTimeout(makeBestMove, 250);
        }

        function updateStatus() {
            var status = game.in_checkmate() ? "Checkmate!" : game.in_draw() ? "Draw" : (game.turn() === 'w' ? "Your turn" : "AI thinking...");
            $status.html(status);
        }

        function resetGame() {
            game.reset();
            board.start();
            sourceSquare = null;
            removeHighlights();
            updateStatus();
        }

        board = Chessboard('board', {
            draggable: true,
            position: 'start',
            onDrop: onDrop,
            pieceTheme: 'https://chessboardjs.com/img/chesspieces/wikipedia/{piece}.png',
            onSnapEnd: () => board.position(game.fen())
        });

        // Add Click/Tap support
        $('#board').on('click', '.square-55d63', function() {
            var square = $(this).attr('data-square');
            onSquareClick(square);
        });

        updateStatus();
    </script>
</body>
</html>
