<!doctype html>

<style>
*{ box-sizing:border-box; margin:0; padding:0; }

body{
  font-family:system-ui;
  display:flex;
  justify-content:center;
  align-items:flex-start;
  min-height:100vh;
  background:#f0f2f5;
  padding:10px;
}

.app{
  width:100%;
  max-width:420px;
  display:flex;
  flex-direction:column;
  gap:10px;
}

.top{
  display:flex;
  justify-content:space-between;
  font-weight:bold;
  font-size:18px;
}

.main{
  background:white;
  padding:12px;
  border-radius:16px;
  display:flex;
  flex-direction:column;
  gap:10px;
}

.country-display{
  text-align:center;
  font-size:24px;
  font-weight:900;
  padding:16px 8px 8px;
  min-height:60px;
  display:flex;
  align-items:center;
  justify-content:center;
  line-height:1.2;
}

.controls{
  display:flex;
  gap:6px;
}

button{
  flex:1;
  padding:10px;
  font-size:16px;
  border:none;
  border-radius:12px;
  background:#222;
  color:white;
  font-weight:bold;
  cursor:pointer;
}

.grid{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:10px;
}

.choice{
  padding:14px 8px;
  font-size:62px;
  line-height:1.1;
  border-radius:12px;
  background:#ffffff;
  border:2px solid #000;
  color:#000;
  cursor:pointer;
  display:flex;
  align-items:center;
  justify-content:center;
  min-height:90px;
}

.good{ background:#00c853; border-color:#00c853; }
.bad{  background:#d50000; border-color:#d50000; }
</style>
</head>

  <div class="top">
    <div>✅ <span id="hits">0</span></div>
    <div>❌ <span id="misses">0</span></div>
  </div>
  <div class="main">
    <div class="country-display" id="country">?</div>
    <div id="grid" class="grid"></div>
    <div class="controls">
      <button id="start">Jouer</button>
      <button id="repeat">🔊</button>
    </div>
  </div>
</div>

function flagEmoji(code){
  return [...code.toUpperCase()]
    .map(c => String.fromCodePoint(0x1F1E6 + c.charCodeAt(0) - 65))
    .join('');
}

let hits = 0, misses = 0;
let round = null, lock = false;
let voices = [], voicesReady = false;

function loadVoices(){
  voices = speechSynthesis.getVoices();
  if(voices.length) voicesReady = true;
}
speechSynthesis.onvoiceschanged = loadVoices;
loadVoices();

function speak(text){
  if(!voicesReady) return;
  speechSynthesis.cancel();
  const u = new SpeechSynthesisUtterance(text);
  const fr = voices.find(v => v.lang.startsWith("fr"));
  if(fr) u.voice = fr;
  u.lang = "fr-FR";
  u.rate = 0.9;
  speechSynthesis.speak(u);
}

function shuffle(a){ return [...a].sort(() => Math.random() - 0.5); }

function nextRound(){
  lock = false;

  const target = COUNTRIES[Math.floor(Math.random() * COUNTRIES.length)];
  const sameR  = COUNTRIES.filter(c => c !== target && c.r === target.r);
  const pool   = sameR.length >= 3 ? sameR : COUNTRIES.filter(c => c !== target);
  const wrongs = shuffle(pool).slice(0, 3);
  const choices = shuffle([target, ...wrongs]);

  round = {target, choices};

  document.getElementById("country").textContent = target.name;
  renderChoices(choices);
  setTimeout(() => speak(target.name), 400);
}

function renderChoices(choices){
  const grid = document.getElementById("grid");
  grid.innerHTML = "";
  choices.forEach(c => {
    const b = document.createElement("button");
    b.className = "choice";
    b.textContent = flagEmoji(c.code);
    b.onclick = () => {
      if(lock) return;
      if(c === round.target){
        lock = true;
        hits++;
        document.getElementById("hits").textContent = hits;
        b.classList.add("good");
        speak(c.name);
        setTimeout(nextRound, 1000);
      } else {
        misses++;
        document.getElementById("misses").textContent = misses;
        b.classList.add("bad");
        setTimeout(() => b.classList.remove("bad"), 350);
      }
    };
    grid.appendChild(b);
  });
}

document.getElementById("start").onclick = () => {
  speechSynthesis.resume();
  nextRound();
};

document.getElementById("repeat").onclick = () => {
  speechSynthesis.resume();
  if(round) speak(round.target.name);
};
