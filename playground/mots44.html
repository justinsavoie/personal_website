<!doctype html>
<html lang="fr">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Château des additions et des mots</title>

<style>
body{
  margin:0;
  font-family:system-ui;
  min-height:100vh;
  background:#475569;
  display:flex;
  justify-content:center;
  align-items:center;
  touch-action:manipulation;
}

.app{
  width:100%;
  max-width:430px;
  padding:14px;
  display:flex;
  flex-direction:column;
  gap:12px;
}

.top{
  display:flex;
  justify-content:space-between;
  font-weight:900;
  font-size:16px;
  color:#fff;
}

.card{
  background:white;
  border-radius:18px;
  padding:14px;
  display:flex;
  flex-direction:column;
  gap:12px;
  box-shadow:0 5px 16px rgba(0,0,0,0.3);
}

.yard{
  background:linear-gradient(180deg,#bae6fd 0%,#bae6fd 60%,#86efac 60%,#86efac 100%);
  border:6px solid #1e293b;
  border-radius:22px;
  padding:10px;
  position:relative;
  min-height:170px;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:flex-end;
  gap:6px;
}

.overlay-icons{
  display:flex;
  gap:10px;
  font-size:30px;
  min-height:38px;
}

.overlay-icons span{
  opacity:0;
  transform:translateY(10px);
  transition:opacity 0.4s ease, transform 0.4s ease;
}

.overlay-icons span.shown{
  opacity:1;
  transform:translateY(0);
}

.wall{
  display:grid;
  grid-template-columns:repeat(5, 1fr);
  gap:4px;
  background:#78350f;
  padding:6px;
  border-radius:8px 8px 0 0;
}

.brick{
  width:100%;
  aspect-ratio:2/1;
  background:#a8a29e;
  border-radius:2px;
  transition:background 0.3s ease, transform 0.3s ease;
}

.brick.filled{
  background:linear-gradient(180deg,#f59e0b,#b45309);
  transform:scale(1.03);
}

.progress{
  display:flex;
  justify-content:space-between;
  font-weight:900;
  font-size:16px;
}

.bar{
  height:20px;
  border-radius:999px;
  background:#cbd5e1;
  overflow:hidden;
}

.fill{
  height:100%;
  width:0%;
  background:linear-gradient(90deg,#fbbf24,#b45309);
  transition:width 0.4s ease;
}

.prompt{
  text-align:center;
  font-size:38px;
  font-weight:900;
  letter-spacing:1px;
  min-height:60px;
  display:flex;
  align-items:center;
  justify-content:center;
}

.grid{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:10px;
}

button{
  border:none;
  border-radius:14px;
  background:#222;
  color:white;
  font-weight:900;
  cursor:pointer;
  box-shadow:0 4px 0 rgba(0,0,0,0.16);
}

button:active{
  transform:scale(0.96);
}

.choice{
  min-height:66px;
  font-size:24px;
  background:#fff;
  color:#111;
  border:3px solid #78350f;
}

.controls{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:8px;
}

.control{
  min-height:54px;
  font-size:18px;
}

.good{
  background:#16a34a !important;
  color:white !important;
  border-color:#16a34a !important;
}

.bad{
  background:#dc2626 !important;
  color:white !important;
  border-color:#dc2626 !important;
}

.message{
  min-height:28px;
  text-align:center;
  font-size:18px;
  font-weight:900;
}

.medal{
  text-align:center;
  font-size:14px;
  color:#78350f;
  font-weight:700;
}
</style>
</head>

<body>
<div class="app">
  <div class="top">
    <div>🧱 Château: <span id="brickCount">0</span>/20</div>
    <div>🎖️ Meilleure médaille: <span id="bestMedal">–</span></div>
  </div>

  <div class="card">
    <div class="yard">
      <div class="overlay-icons">
        <span id="iconFlag">🚩</span>
        <span id="iconTower">🗼</span>
        <span id="iconDragon">🐉</span>
        <span id="iconCrown">👑</span>
      </div>
      <div class="wall" id="wall"></div>
    </div>

    <div class="progress">
      <span>Chantier</span>
      <span><span id="position">0</span> / 20</span>
      <span>Château fini</span>
    </div>
    <div class="bar"><div class="fill" id="fill"></div></div>

    <div class="prompt" id="prompt">?</div>
    <div class="message" id="message">Réponds pour poser une brique !</div>
    <div class="grid" id="grid"></div>
    <div class="medal" id="medalMessage"></div>

    <div class="controls">
      <button class="control" id="start">Jouer</button>
      <button class="control" id="repeat">🔊</button>
    </div>
  </div>
</div>

<script>
const TOTAL_BRICKS = 20;

const WORDS = [
  {emoji:"🏰", word:"château"},
  {emoji:"🤴", word:"chevalier"},
  {emoji:"🐉", word:"dragon"},
  {emoji:"👑", word:"couronne"},
  {emoji:"⚔️", word:"épée"},
  {emoji:"🚩", word:"drapeau"},
  {emoji:"🗼", word:"tour"},
  {emoji:"🌉", word:"pont"},
  {emoji:"👸", word:"reine"},
  {emoji:"🛡️", word:"bouclier"}
];

const MEDALS = [
  {min:90, emoji:"🥇", name:"Or"},
  {min:75, emoji:"🥈", name:"Argent"},
  {min:50, emoji:"🥉", name:"Bronze"}
];

let hits = 0;
let misses = 0;
let bricksFilled = 0;
let roundIndex = 0;
let round = null;
let lock = false;
let voices = [];

const brickCountEl = document.getElementById("brickCount");
const bestMedalEl = document.getElementById("bestMedal");
const positionEl = document.getElementById("position");
const fillEl = document.getElementById("fill");
const promptEl = document.getElementById("prompt");
const messageEl = document.getElementById("message");
const medalMessageEl = document.getElementById("medalMessage");
const grid = document.getElementById("grid");
const wall = document.getElementById("wall");

const milestoneIcons = {
  5: document.getElementById("iconFlag"),
  10: document.getElementById("iconTower"),
  15: document.getElementById("iconDragon"),
  20: document.getElementById("iconCrown")
};

function shuffle(items){
  return [...items].sort(() => Math.random() - 0.5);
}

function loadVoices(){
  voices = speechSynthesis.getVoices();
}
speechSynthesis.onvoiceschanged = loadVoices;
loadVoices();

function speak(text){
  speechSynthesis.cancel();
  const utter = new SpeechSynthesisUtterance(text);
  const frVoice = voices.find(v => v.lang.startsWith("fr"));
  if(frVoice) utter.voice = frVoice;
  utter.lang = "fr-FR";
  utter.rate = 0.9;
  speechSynthesis.speak(utter);
}

function randInt(min, max){
  return Math.floor(Math.random() * (max - min + 1)) + min;
}

function buildWall(){
  wall.innerHTML = "";
  for(let i = 0; i < TOTAL_BRICKS; i++){
    const div = document.createElement("div");
    div.className = "brick";
    wall.appendChild(div);
  }
}

function medalRank(name){
  return MEDALS.findIndex(m => m.name === name);
}

function getBestMedal(){
  return localStorage.getItem("chateau_best_medal") || "";
}

function saveBestMedalIfBetter(name){
  const current = getBestMedal();
  const currentRank = current ? medalRank(current) : Infinity;
  const newRank = medalRank(name);
  if(newRank !== -1 && newRank < currentRank){
    localStorage.setItem("chateau_best_medal", name);
  }
}

function renderBestMedal(){
  const best = getBestMedal();
  if(!best){
    bestMedalEl.textContent = "–";
    return;
  }
  const medal = MEDALS.find(m => m.name === best);
  bestMedalEl.textContent = medal ? `${medal.emoji} ${medal.name}` : "–";
}

function uniqueWrongNumbers(correct, count){
  const wrong = new Set();
  while(wrong.size < count){
    const candidate = correct + randInt(-10, 10);
    if(candidate !== correct && candidate >= 0) wrong.add(candidate);
  }
  return [...wrong];
}

function updateWall(){
  brickCountEl.textContent = bricksFilled;
  positionEl.textContent = bricksFilled;
  const pct = Math.min(100, (bricksFilled / TOTAL_BRICKS) * 100);
  fillEl.style.width = `${pct}%`;
  const bricks = wall.querySelectorAll(".brick");
  bricks.forEach((brick, index) => {
    brick.classList.toggle("filled", index < bricksFilled);
  });
}

function makeAdditionRound(){
  const a = randInt(0, 12);
  const b = randInt(0, 9);
  const pair = Math.random() < 0.5 ? [a, b] : [b, a];
  const left = pair[0];
  const right = pair[1];
  const answer = left + right;
  round = {
    type: "addition",
    answer,
    choices: shuffle([answer, ...uniqueWrongNumbers(answer, 3)])
  };
  promptEl.textContent = `${left} + ${right} = ?`;
  setTimeout(() => speak(`${left} plus ${right}`), 300);
}

function makeWordRound(){
  const correct = WORDS[randInt(0, WORDS.length - 1)];
  const pool = WORDS.filter(w => w.word !== correct.word);
  const wrongs = shuffle(pool).slice(0, 3).map(w => w.word);
  round = {
    type: "word",
    answer: correct.word,
    choices: shuffle([correct.word, ...wrongs])
  };
  promptEl.textContent = correct.emoji;
  setTimeout(() => speak("Quel est ce mot ?"), 300);
}

function makeRound(){
  lock = false;
  if(roundIndex % 2 === 0){
    makeAdditionRound();
  } else {
    makeWordRound();
  }
  roundIndex++;
  renderChoices();
}

function renderChoices(){
  grid.innerHTML = "";
  round.choices.forEach(value => {
    const btn = document.createElement("button");
    btn.className = "choice";
    btn.textContent = value;
    btn.onclick = () => choose(value, btn);
    grid.appendChild(btn);
  });
}

function finishCastle(){
  const total = hits + misses;
  const accuracy = total > 0 ? Math.round((hits / total) * 100) : 0;
  const medal = MEDALS.find(m => accuracy >= m.min);
  if(medal){
    saveBestMedalIfBetter(medal.name);
    renderBestMedal();
    medalMessageEl.textContent = `Château terminé ! Précision: ${accuracy}%. Médaille: ${medal.emoji} ${medal.name} !`;
    speak(`Bravo, ton château est fini ! Tu gagnes la médaille de ${medal.name} !`);
  } else {
    medalMessageEl.textContent = `Château terminé ! Précision: ${accuracy}%. Continue tes efforts !`;
    speak("Ton château est fini ! Continue tes efforts la prochaine fois !");
  }
  Object.values(milestoneIcons).forEach(icon => icon.classList.remove("shown"));
}

function choose(value, btn){
  if(lock || !round) return;
  if(value === round.answer){
    lock = true;
    hits++;
    bricksFilled++;
    btn.classList.add("good");
    updateWall();

    if(milestoneIcons[bricksFilled]){
      milestoneIcons[bricksFilled].classList.add("shown");
    }

    if(bricksFilled >= TOTAL_BRICKS){
      finishCastle();
      setTimeout(resetGame, 2600);
    } else {
      messageEl.textContent = "Bravo ! Une brique de plus.";
      speak("Bravo !");
      setTimeout(makeRound, 800);
    }
  } else {
    misses++;
    btn.classList.add("bad");
    messageEl.textContent = "Pas grave, réessaie !";
    speak("Pas grave, essaie encore.");
    setTimeout(() => btn.classList.remove("bad"), 450);
    lock = false;
  }
}

function resetGame(){
  hits = 0;
  misses = 0;
  bricksFilled = 0;
  roundIndex = 0;
  medalMessageEl.textContent = "";
  Object.values(milestoneIcons).forEach(icon => icon.classList.remove("shown"));
  buildWall();
  updateWall();
  makeRound();
}

document.getElementById("start").onclick = () => {
  speechSynthesis.resume();
  resetGame();
};

document.getElementById("repeat").onclick = () => {
  speechSynthesis.resume();
  if(!round) return;
  if(round.type === "addition"){
    speak(promptEl.textContent.replace("+", "plus").replace("=", "égal").replace("?", ""));
  } else {
    speak("Quel est ce mot ?");
  }
};

buildWall();
renderBestMedal();
updateWall();
</script>
</body>
</html>
