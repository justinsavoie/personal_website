<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Serpents et Échelles</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
    font-family: system-ui, sans-serif;
    background: #1a1a2e;
    min-height: 100vh;
    display: flex;
    justify-content: center;
    align-items: flex-start;
    padding: 20px;
    color: white;
}

/* ── Setup ── */
#setup {
    background: #16213e;
    border-radius: 20px;
    padding: 30px 24px;
    max-width: 480px;
    width: 100%;
    text-align: center;
}
#setup h1 { font-size: 26px; margin-bottom: 6px; }
#setup .sub { color: #aaa; margin-bottom: 22px; font-size: 14px; }

.player-setup {
    margin: 14px 0;
    padding: 18px;
    background: #0f3460;
    border-radius: 15px;
}
.player-setup h2 { margin-bottom: 13px; font-size: 18px; }
.colors { display: flex; gap: 10px; justify-content: center; flex-wrap: wrap; }
.color-btn {
    width: 42px; height: 42px;
    border-radius: 50%;
    border: 3px solid transparent;
    cursor: pointer;
    transition: transform 0.15s, border-color 0.15s;
    outline: none;
}
.color-btn:hover { transform: scale(1.12); }
.color-btn.selected { border-color: white; transform: scale(1.15); box-shadow: 0 0 10px rgba(255,255,255,0.4); }
.color-btn.taken { opacity: 0.25; cursor: not-allowed; transform: none; }

#start-btn {
    margin-top: 22px;
    padding: 14px 40px;
    font-size: 19px;
    background: #e94560;
    color: white;
    border: none;
    border-radius: 12px;
    cursor: pointer;
    font-weight: bold;
    transition: background 0.2s;
}
#start-btn:hover { background: #c73652; }
#start-btn:disabled { background: #555; cursor: not-allowed; }

/* ── Game ── */
#game {
    display: none;
    flex-direction: column;
    align-items: center;
    gap: 13px;
    width: 100%;
    max-width: 560px;
}

.players-bar {
    display: flex;
    gap: 14px;
    width: 100%;
    justify-content: center;
}
.player-card {
    flex: 1;
    background: #16213e;
    border-radius: 12px;
    padding: 11px;
    text-align: center;
    border: 3px solid transparent;
    transition: border-color 0.3s, box-shadow 0.3s;
    max-width: 200px;
}
.player-card.active {
    border-color: gold;
    box-shadow: 0 0 14px rgba(255,215,0,0.3);
}
.player-token {
    width: 28px; height: 28px;
    border-radius: 50%;
    margin: 0 auto 7px;
    border: 2px solid rgba(255,255,255,0.3);
}
.player-pos { font-size: 22px; font-weight: bold; }
.player-label { font-size: 12px; color: #aaa; margin-top: 3px; }

canvas { border-radius: 8px; max-width: 100%; display: block; }

.controls {
    display: flex;
    gap: 12px;
    align-items: center;
    flex-wrap: wrap;
    justify-content: center;
}
#dice-display { font-size: 52px; line-height: 1; min-width: 60px; text-align: center; }
#roll-btn {
    padding: 13px 32px;
    font-size: 20px;
    background: #e94560;
    color: white;
    border: none;
    border-radius: 12px;
    cursor: pointer;
    font-weight: bold;
    transition: transform 0.1s, background 0.2s;
}
#roll-btn:hover:not(:disabled) { transform: scale(1.04); background: #c73652; }
#roll-btn:disabled { background: #555; cursor: not-allowed; }

.icon-btn {
    background: #0f3460;
    border: none;
    color: white;
    padding: 10px 14px;
    border-radius: 10px;
    cursor: pointer;
    font-size: 20px;
    transition: background 0.2s;
}
.icon-btn:hover { background: #1a4a80; }

#message {
    background: #16213e;
    border-radius: 12px;
    padding: 11px 20px;
    font-size: 16px;
    text-align: center;
    min-height: 46px;
    width: 100%;
    max-width: 420px;
    display: flex;
    align-items: center;
    justify-content: center;
    line-height: 1.4;
}

#restart-btn {
    padding: 12px 30px;
    font-size: 17px;
    background: #0f3460;
    color: white;
    border: none;
    border-radius: 12px;
    cursor: pointer;
    display: none;
    transition: background 0.2s;
}
#restart-btn:hover { background: #1a4a80; }
</style>
</head>
<body>

<!-- ══ SETUP ══ -->
<div id="setup">
    <h1>🎲 Serpents et Échelles</h1>
    <p class="sub">Jeu pour 2 joueurs — premier à atteindre la case 100 gagne !</p>

    <div class="player-setup">
        <h2>Joueur 1 — Choisis ta couleur</h2>
        <div class="colors" id="p1-colors"></div>
    </div>
    <div class="player-setup">
        <h2>Joueur 2 — Choisis ta couleur</h2>
        <div class="colors" id="p2-colors"></div>
    </div>

    <button id="start-btn" disabled>Commencer !</button>
</div>

<!-- ══ GAME ══ -->
<div id="game">
    <div class="players-bar">
        <div class="player-card" id="card-0">
            <div class="player-token" id="token-0"></div>
            <div class="player-pos" id="pos-0">1</div>
            <div class="player-label">Joueur 1</div>
        </div>
        <div class="player-card" id="card-1">
            <div class="player-token" id="token-1"></div>
            <div class="player-pos" id="pos-1">1</div>
            <div class="player-label">Joueur 2</div>
        </div>
    </div>

    <canvas id="board" width="520" height="520"></canvas>

    <div class="controls">
        <div id="dice-display">🎲</div>
        <button id="roll-btn">Lancer le dé</button>
        <button class="icon-btn" id="music-btn" title="Musique">🔊</button>
    </div>

    <div id="message">À Joueur 1 de jouer !</div>
    <button id="restart-btn">🔄 Nouvelle partie</button>
</div>

<script>
// ═══════════════════════════════════════════════════════
// CONSTANTS
// ═══════════════════════════════════════════════════════
const COLORS = ['#e74c3c','#3498db','#2ecc71','#f1c40f','#9b59b6','#e91e63'];

// Ladders: bottom-square → top-square (always go UP)
const LADDERS = { 4:25, 13:46, 33:49, 42:63, 50:69, 57:76, 66:87, 74:91 };

// Snakes: head-square → tail-square (always go DOWN)
const SNAKES  = { 17:7, 27:1, 45:31, 56:34, 72:51, 82:43, 88:68, 96:75, 99:60 };

const DICE_FACES = ['⚀','⚁','⚂','⚃','⚄','⚅'];
const BOARD_PX = 520;
const CELL = BOARD_PX / 10;

// ═══════════════════════════════════════════════════════
// AUDIO
// ═══════════════════════════════════════════════════════
let audioCtx = null;
let bgOn = false;
let bgTimer = null;

function ac() {
    if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    return audioCtx;
}

function tone(freq, tStart, dur, type = 'sine', vol = 0.3) {
    const ctx = ac();
    const o = ctx.createOscillator();
    const g = ctx.createGain();
    o.type = type;
    o.frequency.value = freq;
    g.gain.setValueAtTime(vol, ctx.currentTime + tStart);
    g.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + tStart + dur);
    o.connect(g); g.connect(ctx.destination);
    o.start(ctx.currentTime + tStart);
    o.stop(ctx.currentTime + tStart + dur + 0.05);
}

function sfxDice() {
    for (let i = 0; i < 7; i++) tone(500 + Math.random()*400, i*0.065, 0.06, 'square', 0.12);
}

function sfxLadder() {
    // Ascending happy arpeggio
    [261,329,392,523,659,784].forEach((f,i) => tone(f, i*0.11, 0.22, 'sine', 0.32));
}

function sfxSnake() {
    // Descending chromatic descent
    [523,466,415,370,330,294,261].forEach((f,i) => tone(f, i*0.13, 0.26, 'triangle', 0.28));
}

function sfxWin() {
    // Victory fanfare
    [[523,0],[659,.18],[784,.36],[1047,.56],[784,.82],[1047,1.05],[1319,1.3]].forEach(([f,t]) =>
        tone(f, t, 0.35, 'sine', 0.45));
    [523,659,784].forEach(f => tone(f, 1.75, 1.1, 'sine', 0.28));
}

// Background: pentatonic lullaby loop
const BG = [
    [523,.28],[659,.28],[784,.28],[659,.28],
    [523,.28],[440,.28],[392,.28],[440,.55],
    [523,.28],[659,.28],[784,.28],[880,.28],
    [784,.28],[659,.55],[523,.55],
];

function scheduleBg() {
    if (!bgOn) return;
    const ctx = ac();
    let t = ctx.currentTime + 0.05;
    BG.forEach(([f, dur]) => {
        const o = ctx.createOscillator();
        const g = ctx.createGain();
        o.type = 'triangle';
        o.frequency.value = f;
        g.gain.setValueAtTime(0.07, t);
        g.gain.exponentialRampToValueAtTime(0.001, t + dur * 0.85);
        o.connect(g); g.connect(ctx.destination);
        o.start(t); o.stop(t + dur);
        t += dur;
    });
    const total = BG.reduce((s,[,d]) => s+d, 0);
    bgTimer = setTimeout(scheduleBg, total * 1000 - 150);
}

function toggleBg() {
    bgOn = !bgOn;
    document.getElementById('music-btn').textContent = bgOn ? '🔊' : '🔇';
    if (bgOn) scheduleBg();
    else clearTimeout(bgTimer);
}

// ═══════════════════════════════════════════════════════
// SETUP SCREEN
// ═══════════════════════════════════════════════════════
let chosen = [null, null];

function initSetup() {
    [0,1].forEach(p => {
        const wrap = document.getElementById(`p${p+1}-colors`);
        COLORS.forEach((col, idx) => {
            const btn = document.createElement('button');
            btn.className = 'color-btn';
            btn.style.background = col;
            btn.dataset.col = col;
            btn.dataset.idx = idx;
            btn.addEventListener('click', () => pick(p, col, idx));
            wrap.appendChild(btn);
        });
    });
}

function pick(player, col, idx) {
    const other = 1 - player;
    if (chosen[other] === col) return;
    chosen[player] = col;

    [`p${player+1}-colors`, `p${other+1}-colors`].forEach((id, isOther) => {
        document.getElementById(id).querySelectorAll('.color-btn').forEach(btn => {
            btn.classList.remove('selected','taken');
            if (btn.dataset.col === chosen[isOther ? player : other]) btn.classList.add('taken');
        });
    });
    document.getElementById(`p${player+1}-colors`)
        .querySelector(`[data-idx="${idx}"]`).classList.add('selected');

    document.getElementById('start-btn').disabled = !(chosen[0] && chosen[1]);
}

// ═══════════════════════════════════════════════════════
// BOARD GEOMETRY
// ═══════════════════════════════════════════════════════
function sqPos(n) {
    const idx = n - 1;
    const row = Math.floor(idx / 10);          // 0 = bottom row
    const col = idx % 10;
    const acol = (row % 2 === 0) ? col : (9 - col);
    return {
        x: acol * CELL + CELL / 2,
        y: (9 - row) * CELL + CELL / 2         // canvas Y flipped
    };
}

// ═══════════════════════════════════════════════════════
// CANVAS DRAWING
// ═══════════════════════════════════════════════════════
let cvs, ctx2;

function initCanvas() {
    cvs = document.getElementById('board');
    ctx2 = cvs.getContext('2d');
    const w = Math.min(window.innerWidth - 40, BOARD_PX);
    cvs.style.width  = w + 'px';
    cvs.style.height = w + 'px';
}

function drawBoard() {
    ctx2.clearRect(0, 0, BOARD_PX, BOARD_PX);

    // Board background
    ctx2.fillStyle = '#fef3c7';
    ctx2.fillRect(0, 0, BOARD_PX, BOARD_PX);

    // Cells
    for (let crow = 0; crow < 10; crow++) {       // canvas row 0=top
        for (let ccol = 0; ccol < 10; ccol++) {
            const brow = 9 - crow;                 // board row 0=bottom
            const bcol = (brow % 2 === 0) ? ccol : (9 - ccol);
            const n    = brow * 10 + bcol + 1;
            const x    = ccol * CELL;
            const y    = crow * CELL;

            // Alternating cells
            ctx2.fillStyle = ((crow + ccol) % 2 === 0) ? '#fff8e1' : '#fde68a';
            ctx2.fillRect(x + 1, y + 1, CELL - 2, CELL - 2);

            // Special highlight for 100
            if (n === 100) {
                ctx2.fillStyle = '#ffd700';
                ctx2.fillRect(x + 1, y + 1, CELL - 2, CELL - 2);
            }

            // Number
            ctx2.fillStyle = '#888';
            ctx2.font = `bold ${CELL * 0.22}px system-ui`;
            ctx2.textAlign = 'center';
            ctx2.textBaseline = 'top';
            ctx2.fillText(n, x + CELL / 2, y + 3);
        }
    }

    // Grid lines
    ctx2.strokeStyle = '#e5c97a';
    ctx2.lineWidth = 1;
    for (let i = 0; i <= 10; i++) {
        ctx2.beginPath(); ctx2.moveTo(i*CELL, 0);       ctx2.lineTo(i*CELL, BOARD_PX);    ctx2.stroke();
        ctx2.beginPath(); ctx2.moveTo(0, i*CELL);       ctx2.lineTo(BOARD_PX, i*CELL);    ctx2.stroke();
    }

    // Ladders
    Object.entries(LADDERS).forEach(([f,t]) => drawLadder(+f, +t));

    // Snakes
    Object.entries(SNAKES).forEach(([f,t]) => drawSnake(+f, +t));

    // Player tokens
    positions.forEach((pos, i) => {
        const p = sqPos(pos);
        const ox = i === 0 ? -9 : 9;
        const r  = CELL * 0.21;

        // Shadow
        ctx2.beginPath();
        ctx2.arc(p.x + ox + 1, p.y + 7, r, 0, Math.PI*2);
        ctx2.fillStyle = 'rgba(0,0,0,0.25)';
        ctx2.fill();

        // Token
        ctx2.beginPath();
        ctx2.arc(p.x + ox, p.y + 5, r, 0, Math.PI*2);
        ctx2.fillStyle = chosen[i];
        ctx2.fill();
        ctx2.strokeStyle = 'rgba(255,255,255,0.6)';
        ctx2.lineWidth = 2;
        ctx2.stroke();

        // Number inside
        ctx2.fillStyle = 'white';
        ctx2.font = `bold ${CELL * 0.19}px system-ui`;
        ctx2.textAlign = 'center';
        ctx2.textBaseline = 'middle';
        ctx2.fillText(i + 1, p.x + ox, p.y + 5);
    });
}

function drawLadder(from, to) {
    const p1 = sqPos(from);
    const p2 = sqPos(to);
    const dx = p2.x - p1.x;
    const dy = p2.y - p1.y;
    const len = Math.hypot(dx, dy);
    const px = (-dy / len) * 7;
    const py = (dx  / len) * 7;

    ctx2.strokeStyle = '#92400e';
    ctx2.lineCap = 'round';

    // Two rails
    [1, -1].forEach(side => {
        ctx2.lineWidth = 3;
        ctx2.beginPath();
        ctx2.moveTo(p1.x + px*side, p1.y + py*side);
        ctx2.lineTo(p2.x + px*side, p2.y + py*side);
        ctx2.stroke();
    });

    // Rungs
    const rungs = Math.max(3, Math.floor(len / 22));
    ctx2.lineWidth = 2.5;
    for (let i = 1; i < rungs; i++) {
        const t = i / rungs;
        const rx = p1.x + dx*t, ry = p1.y + dy*t;
        ctx2.beginPath();
        ctx2.moveTo(rx + px, ry + py);
        ctx2.lineTo(rx - px, ry - py);
        ctx2.stroke();
    }

    // Arrow dot at top
    ctx2.fillStyle = '#92400e';
    ctx2.beginPath();
    ctx2.arc(p2.x, p2.y, 5, 0, Math.PI*2);
    ctx2.fill();
}

function drawSnake(head, tail) {
    const h = sqPos(head);
    const t = sqPos(tail);
    const mx = (h.x + t.x) / 2;
    const my = (h.y + t.y) / 2;
    const dx = t.x - h.x, dy = t.y - h.y;

    // Wavy bezier
    const cx1 = h.x + dx*0.3 + dy*0.35;
    const cy1 = h.y + dy*0.3 - dx*0.35;
    const cx2 = h.x + dx*0.7 - dy*0.35;
    const cy2 = h.y + dy*0.7 + dx*0.35;

    // Body outline
    ctx2.strokeStyle = '#7f1d1d';
    ctx2.lineWidth = 11;
    ctx2.lineCap = 'round';
    ctx2.beginPath();
    ctx2.moveTo(h.x, h.y);
    ctx2.bezierCurveTo(cx1, cy1, cx2, cy2, t.x, t.y);
    ctx2.stroke();

    // Body fill
    ctx2.strokeStyle = '#dc2626';
    ctx2.lineWidth = 8;
    ctx2.beginPath();
    ctx2.moveTo(h.x, h.y);
    ctx2.bezierCurveTo(cx1, cy1, cx2, cy2, t.x, t.y);
    ctx2.stroke();

    // Highlight stripe
    ctx2.strokeStyle = '#fca5a5';
    ctx2.lineWidth = 2;
    ctx2.beginPath();
    ctx2.moveTo(h.x, h.y);
    ctx2.bezierCurveTo(cx1, cy1, cx2, cy2, t.x, t.y);
    ctx2.stroke();

    // Head circle
    ctx2.fillStyle = '#991b1b';
    ctx2.beginPath();
    ctx2.arc(h.x, h.y, 10, 0, Math.PI*2);
    ctx2.fill();

    // Eyes
    ctx2.fillStyle = 'white';
    [[-3,-3],[3,-3]].forEach(([ex,ey]) => {
        ctx2.beginPath();
        ctx2.arc(h.x+ex, h.y+ey, 3, 0, Math.PI*2);
        ctx2.fill();
    });
    ctx2.fillStyle = '#111';
    [[-3,-3],[3,-3]].forEach(([ex,ey]) => {
        ctx2.beginPath();
        ctx2.arc(h.x+ex, h.y+ey, 1.5, 0, Math.PI*2);
        ctx2.fill();
    });

    // Tail dot
    ctx2.fillStyle = '#dc2626';
    ctx2.beginPath();
    ctx2.arc(t.x, t.y, 4, 0, Math.PI*2);
    ctx2.fill();
}

// ═══════════════════════════════════════════════════════
// GAME STATE
// ═══════════════════════════════════════════════════════
let positions = [1, 1];
let current = 0;
let gameOver = false;
let busy = false;

function sleep(ms) { return new Promise(r => setTimeout(r, ms)); }

function updateUI() {
    document.getElementById('pos-0').textContent = positions[0];
    document.getElementById('pos-1').textContent = positions[1];
    document.getElementById('card-0').classList.toggle('active', current === 0);
    document.getElementById('card-1').classList.toggle('active', current === 1);
    if (!gameOver)
        document.getElementById('message').textContent = `À Joueur ${current+1} de jouer !`;
}

function setMsg(txt) {
    document.getElementById('message').textContent = txt;
}

async function rollDice() {
    if (busy || gameOver) return;
    busy = true;
    document.getElementById('roll-btn').disabled = true;

    sfxDice();

    // Animate dice
    let c = 0;
    await new Promise(resolve => {
        const iv = setInterval(() => {
            document.getElementById('dice-display').textContent =
                DICE_FACES[Math.floor(Math.random()*6)];
            if (++c >= 9) { clearInterval(iv); resolve(); }
        }, 75);
    });

    const roll = Math.floor(Math.random()*6) + 1;
    document.getElementById('dice-display').textContent = DICE_FACES[roll-1];

    await sleep(350);
    await processRoll(roll);
}

async function processRoll(roll) {
    const p   = current;
    let newPos = positions[p] + roll;

    setMsg(`Joueur ${p+1} fait un ${roll} !`);
    await sleep(500);

    if (newPos > 100) {
        setMsg(`Joueur ${p+1} fait ${roll}… trop loin ! Il faut tomber pile sur 100.`);
        await sleep(1200);
        endTurn();
        return;
    }

    // Step-by-step movement
    const startPos = positions[p];
    for (let step = startPos + 1; step <= newPos; step++) {
        positions[p] = step;
        drawBoard();
        document.getElementById(`pos-${p}`).textContent = step;
        await sleep(200);
    }

    // Win immediately?
    if (newPos === 100) { await win(p); return; }

    // Ladder?
    if (LADDERS[newPos]) {
        const dest = LADDERS[newPos];
        setMsg(`🪜 Joueur ${p+1} monte une échelle ! ${newPos} → ${dest}`);
        sfxLadder();
        await sleep(900);
        positions[p] = dest;
        drawBoard();
        document.getElementById(`pos-${p}`).textContent = dest;
        await sleep(500);
        if (dest === 100) { await win(p); return; }
    }

    // Snake?
    if (SNAKES[newPos]) {
        const dest = SNAKES[newPos];
        setMsg(`🐍 Serpent ! Joueur ${p+1} redescend de ${newPos} à ${dest}`);
        sfxSnake();
        await sleep(900);
        positions[p] = dest;
        drawBoard();
        document.getElementById(`pos-${p}`).textContent = dest;
        await sleep(500);
    }

    updateUI();
    endTurn();
}

async function win(p) {
    gameOver = true;
    clearTimeout(bgTimer);
    bgOn = false;
    document.getElementById('music-btn').textContent = '🔇';
    sfxWin();
    setMsg(`🎉 Joueur ${p+1} gagne ! Bravo !`);
    drawBoard();
    document.getElementById('roll-btn').disabled = true;
    document.getElementById('restart-btn').style.display = 'block';
    busy = false;
}

function endTurn() {
    current = 1 - current;
    updateUI();
    busy = false;
    document.getElementById('roll-btn').disabled = false;
}

// ═══════════════════════════════════════════════════════
// START
// ═══════════════════════════════════════════════════════
function startGame() {
    document.getElementById('setup').style.display = 'none';
    const g = document.getElementById('game');
    g.style.display = 'flex';

    positions = [1, 1];
    current   = 0;
    gameOver  = false;
    busy      = false;

    document.getElementById('token-0').style.background = chosen[0];
    document.getElementById('token-1').style.background = chosen[1];

    initCanvas();
    drawBoard();
    updateUI();

    bgOn = true;
    scheduleBg();

    document.getElementById('roll-btn').addEventListener('click', rollDice);
    document.getElementById('music-btn').addEventListener('click', toggleBg);
    document.getElementById('restart-btn').addEventListener('click', () => location.reload());
}

// ── Bootstrap ──
initSetup();
document.getElementById('start-btn').addEventListener('click', startGame);
</script>
</body>
</html>
