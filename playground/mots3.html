<!doctype html>
<html lang="fr">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Jeu des mots</title>

<style>
body{
  margin:0;
  font-family:system-ui;
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
  background:#f0f2f5;
}

.app{
  width:100%;
  max-width:420px;
  padding:10px;
  display:flex;
  flex-direction:column;
  gap:10px;
}

.top{
  display:flex;
  justify-content:space-between;
  font-weight:bold;
  font-size:18px;
}

.main{
  background:white;
  padding:12px;
  border-radius:16px;
  display:flex;
  flex-direction:column;
  gap:10px;
}

.prompt{
  text-align:center;
  font-size:26px;
  font-weight:900;
}

.controls{
  display:flex;
  gap:6px;
}

button{
  flex:1;
  padding:12px;
  font-size:18px;
  border:none;
  border-radius:12px;
  background:#222;   /* contraste élevé */
  color:white;
  font-weight:bold;
}

.grid{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:10px;
}

.choice{
  padding:18px;
  font-size:22px;
  font-weight:900;
  border-radius:12px;
  background:#ffffff;
  border:2px solid #000; /* contraste fort */
  color:#000;
}

.good{
  background:#00c853;
  color:white;
  border-color:#00c853;
}

.bad{
  background:#d50000;
  color:white;
  border-color:#d50000;
}
</style>
</head>

<body>

<div class="app">

  <div class="top">
    <div>✅ <span id="hits">0</span></div>
    <div>❌ <span id="misses">0</span></div>
  </div>

  <div class="main">
    <div class="prompt">Écoute</div>

    <div class="controls">
      <button id="start">Jouer</button>
      <button id="repeat">🔊</button>
    </div>

    <div id="grid" class="grid"></div>
  </div>

</div>

<script>

const words = [
"je vais à l'école",
"je mange une pomme",
"il boit de l'eau",
"elle lit un livre",
"nous allons au parc",
"tu prends le bus",
"je vois un chien",
"elle a un chat",
"il ouvre la porte",
"je ferme la fenêtre",

"nous mangeons du pain",
"tu bois du lait",
"il regarde la télé",
"elle écrit un mot",
"je prends un stylo",
"nous lisons ensemble",
"tu poses une question",
"il donne une réponse",
"elle aime la musique",
"je joue au ballon",

"nous marchons vite",
"tu cours dehors",
"il saute haut",
"elle danse bien",
"je chante une chanson",
"nous regardons le ciel",
"tu vois la lune",
"il aime le soleil",
"elle regarde les étoiles",
"je marche dans la rue",

"nous allons à la maison",
"tu ouvres ton sac",
"il ferme son cahier",
"elle prend un livre",
"je pose mon téléphone",
"nous écrivons un texte",
"tu lis une phrase",
"il compte les nombres",
"elle apprend à lire",
"je fais un dessin",

"nous mangeons ensemble",
"tu prends une cuillère",
"il coupe le pain",
"elle boit du jus",
"je mange une banane",
"nous préparons le repas",
"tu cuisines avec moi",
"il lave les mains",
"elle met la table",
"je nettoie la cuisine",

"nous allons en ville",
"tu prends le métro",
"il conduit la voiture",
"elle marche au parc",
"je vois un arbre",
"nous regardons la rivière",
"tu traverses la rue",
"il monte le pont",
"elle descend la colline",
"je marche sur le chemin",

"nous jouons à un jeu",
"tu gagnes un point",
"il perd la partie",
"elle choisit une carte",
"je lance le dé",
"nous continuons le jeu",
"tu fais une erreur",
"il trouve la réponse",
"elle réussit bien",
"je recommence encore",

"nous sommes à l'école",
"tu parles au prof",
"il écoute bien",
"elle écrit au tableau",
"je réponds à la question",
"nous faisons un exercice",
"tu corriges la phrase",
"il comprend la leçon",
"elle étudie le soir",
"je fais mes devoirs",

"nous partons le matin",
"tu arrives à l'heure",
"il attend dehors",
"elle entre dans la classe",
"je sors à midi",
"nous rentrons à la maison",
"tu ouvres la porte",
"il enlève son manteau",
"elle pose son sac",
"je me repose un peu"
];

let hits = 0;
let misses = 0;
let round = null;
let lock = false;

let voices = [];
let ready = false;

const hitsEl = document.getElementById("hits");
const missesEl = document.getElementById("misses");
const grid = document.getElementById("grid");

function shuffle(a){
  return [...a].sort(()=>Math.random()-0.5);
}

// 🔊 LOAD VOICES PROPERLY
function loadVoices(){
  voices = speechSynthesis.getVoices();
  if(voices.length > 0){
    ready = true;
    console.log("Voices ready:", voices.length);
  }
}

// important pour mobile
speechSynthesis.onvoiceschanged = loadVoices;
loadVoices();

// 🔊 SPEAK ROBUST
function speak(word){
  if(!ready){
    console.log("Voices not ready yet");
    return;
  }

  speechSynthesis.cancel();

  const utter = new SpeechSynthesisUtterance(word);

  // force FR si possible
  const frVoice = voices.find(v => v.lang.startsWith("fr"));
  if(frVoice) utter.voice = frVoice;

  utter.lang = "fr-FR";
  utter.rate = 0.9;

  speechSynthesis.speak(utter);
}

function nextRound(){
  lock = false;

  const target = words[Math.floor(Math.random()*words.length)];
  const choices = shuffle(
    [target, ...shuffle(words.filter(w=>w!==target)).slice(0,3)]
  );

  round = {target, choices};

  render();

  setTimeout(()=>speak(target),1000);
}

function render(){
  grid.innerHTML = "";

  round.choices.forEach(w=>{
    const b = document.createElement("button");
    b.className = "choice";
    b.textContent = w;

    b.onclick = ()=>{
      if(lock) return;

      if(w === round.target){
        lock = true;
        hits++;
        hitsEl.textContent = hits;

        b.classList.add("good");
        speak(w);

        setTimeout(nextRound,800);

      } else {
        misses++;
        missesEl.textContent = misses;

        b.classList.add("bad");
        speak(w);

        setTimeout(()=>b.classList.remove("bad"),300);
      }
    };

    grid.appendChild(b);
  });
}

// 👉 IMPORTANT : premier click débloque audio
document.getElementById("start").onclick = ()=>{
  speechSynthesis.resume(); // 🔥 critical fix
  nextRound();
};

document.getElementById("repeat").onclick = ()=>{
  speechSynthesis.resume();
  if(round) speak(round.target);
};

</script>

</body>
</html>
