<!doctype html>
<html lang="fr">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Jeu des mots</title>

<style>
body{
  margin:0;
  font-family:system-ui;
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
  background:#f0f2f5;
}

.app{
  width:100%;
  max-width:420px;
  padding:10px;
  display:flex;
  flex-direction:column;
  gap:10px;
}

.top{
  display:flex;
  justify-content:space-between;
  font-weight:bold;
  font-size:18px;
}

.main{
  background:white;
  padding:12px;
  border-radius:16px;
  display:flex;
  flex-direction:column;
  gap:10px;
}

.prompt{
  text-align:center;
  font-size:26px;
  font-weight:900;
}

.controls{
  display:flex;
  gap:6px;
}

button{
  flex:1;
  padding:12px;
  font-size:18px;
  border:none;
  border-radius:12px;
  background:#222;   /* contraste élevé */
  color:white;
  font-weight:bold;
}

.grid{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:10px;
}

.choice{
  padding:18px;
  font-size:22px;
  font-weight:900;
  border-radius:12px;
  background:#ffffff;
  border:2px solid #000; /* contraste fort */
  color:#000;
}

.good{
  background:#00c853;
  color:white;
  border-color:#00c853;
}

.bad{
  background:#d50000;
  color:white;
  border-color:#d50000;
}
</style>
</head>

<body>

<div class="app">

  <div class="top">
    <div>✅ <span id="hits">0</span></div>
    <div>❌ <span id="misses">0</span></div>
  </div>

  <div class="main">
    <div class="prompt">Écoute</div>

    <div class="controls">
      <button id="start">Start</button>
      <button id="repeat">🔊</button>
    </div>

    <div id="grid" class="grid"></div>
  </div>

</div>

<script>

const words = [
  "chat","chien","pomme","banane","voiture","ballon",
  "soleil","lune","fleur","poisson","oiseau","ours",
  "bébé","train","bateau","maison","lait","gâteau"
];

let hits = 0;
let misses = 0;
let round = null;
let lock = false;

let voices = [];
let ready = false;

const hitsEl = document.getElementById("hits");
const missesEl = document.getElementById("misses");
const grid = document.getElementById("grid");

function shuffle(a){
  return [...a].sort(()=>Math.random()-0.5);
}

// 🔊 LOAD VOICES PROPERLY
function loadVoices(){
  voices = speechSynthesis.getVoices();
  if(voices.length > 0){
    ready = true;
    console.log("Voices ready:", voices.length);
  }
}

// important pour mobile
speechSynthesis.onvoiceschanged = loadVoices;
loadVoices();

// 🔊 SPEAK ROBUST
function speak(word){
  if(!ready){
    console.log("Voices not ready yet");
    return;
  }

  speechSynthesis.cancel();

  const utter = new SpeechSynthesisUtterance(word);

  // force FR si possible
  const frVoice = voices.find(v => v.lang.startsWith("fr"));
  if(frVoice) utter.voice = frVoice;

  utter.lang = "fr-FR";
  utter.rate = 0.9;

  speechSynthesis.speak(utter);
}

function nextRound(){
  lock = false;

  const target = words[Math.floor(Math.random()*words.length)];
  const choices = shuffle(
    [target, ...shuffle(words.filter(w=>w!==target)).slice(0,3)]
  );

  round = {target, choices};

  render();

  setTimeout(()=>speak(target),200);
}

function render(){
  grid.innerHTML = "";

  round.choices.forEach(w=>{
    const b = document.createElement("button");
    b.className = "choice";
    b.textContent = w;

    b.onclick = ()=>{
      if(lock) return;

      if(w === round.target){
        lock = true;
        hits++;
        hitsEl.textContent = hits;

        b.classList.add("good");
        speak(w);

        setTimeout(nextRound,800);

      } else {
        misses++;
        missesEl.textContent = misses;

        b.classList.add("bad");
        speak(w);

        setTimeout(()=>b.classList.remove("bad"),300);
      }
    };

    grid.appendChild(b);
  });
}

// 👉 IMPORTANT : premier click débloque audio
document.getElementById("start").onclick = ()=>{
  speechSynthesis.resume(); // 🔥 critical fix
  nextRound();
};

document.getElementById("repeat").onclick = ()=>{
  speechSynthesis.resume();
  if(round) speak(round.target);
};

</script>

</body>
</html>
