<!doctype html>
<html lang="fr">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Sudoku des Animaux</title>
<style>
* {
  box-sizing: border-box;
  margin: 0;
  padding: 0;
}

html, body {
  height: 100%;
  margin: 0;
  padding: 0;
  overflow: hidden;
}

body {
  font-family: system-ui, -apple-system, sans-serif;
  display: flex;
  justify-content: center;
  align-items: center;
  background: #fef08a; /* Soft yellow background */
  color: #713f12;
  touch-action: manipulation;
}

.app {
  width: 100%;
  max-width: 420px;
  height: 100%;
  padding: 12px;
  display: flex;
  flex-direction: column;
  justify-content: space-between;
  gap: 10px;
  position: relative;
}

/* 📊 Header */
.top-bar {
  display: flex;
  justify-content: space-between;
  align-items: center;
  font-weight: 800;
  font-size: 18px;
  background: white;
  padding: 10px 14px;
  border-radius: 14px;
  box-shadow: 0 4px 6px rgba(0,0,0,0.05);
  border: 1px solid #fef08a;
  z-index: 10;
}

.stats {
  display: flex;
  gap: 16px;
}

.instruction-banner {
  text-align: center;
  font-weight: 800;
  font-size: 14px;
  background: #fffbeb;
  color: #78350f;
  border: 2px solid #fde68a;
  padding: 8px;
  border-radius: 12px;
  min-height: 38px;
  display: flex;
  align-items: center;
  justify-content: center;
  z-index: 10;
}

/* 🟫 Sudoku Grid Container */
.grid-container {
  flex: 1;
  display: flex;
  justify-content: center;
  align-items: center;
  position: relative;
  z-index: 10;
}

.sudoku-grid {
  width: min(84vw, 320px);
  height: min(84vw, 320px);
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  grid-template-rows: repeat(4, 1fr);
  gap: 4px;
  background: #78350f; /* Dark wood frame */
  border: 6px solid #78350f;
  border-radius: 16px;
  padding: 4px;
  box-shadow: 0 8px 16px rgba(0,0,0,0.15);
}

.cell {
  background: white;
  border: none;
  border-radius: 8px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 38px;
  cursor: pointer;
  position: relative;
  box-shadow: inset 0 -2px 0 rgba(0,0,0,0.05);
  user-select: none;
}

/* Quadrant division lines */
.cell:nth-child(2n) {
  margin-right: 2px;
}
.cell:nth-child(4n) {
  margin-right: 0;
}
.cell:nth-child(n+5):nth-child(-n+8),
.cell:nth-child(n+13):nth-child(-n+16) {
  margin-bottom: 2px;
}

.cell.fixed {
  background: #e2e8f0;
  cursor: default;
  box-shadow: none;
}

.cell.selected {
  outline: 4px solid #ca8a04;
  z-index: 5;
}

.cell.bad {
  background: #fee2e2;
  outline: 4px solid #ef4444;
  z-index: 5;
  animation: shake 0.3s ease-in-out;
}

.cell.good {
  background: #d1fae5;
  outline: 4px solid #10b981;
}

@keyframes shake {
  0%, 100% { transform: translateX(0); }
  25% { transform: translateX(-4px); }
  75% { transform: translateX(4px); }
}

/* 🦊 Emojis Tray */
.tray-box {
  background: #fffbeb;
  border: 2px solid #fde68a;
  border-radius: 16px;
  padding: 10px;
  display: flex;
  flex-direction: column;
  gap: 6px;
  z-index: 10;
}

.tray-title {
  text-align: center;
  font-size: 12px;
  font-weight: 800;
  color: #b45309;
  text-transform: uppercase;
}

.tray-buttons {
  display: grid;
  grid-template-columns: repeat(5, 1fr);
  gap: 8px;
}

.tray-btn {
  border: 2px solid #d97706;
  background: white;
  border-radius: 12px;
  font-size: 26px;
  padding: 6px 0;
  cursor: pointer;
  box-shadow: 0 4px 0 #b45309;
  transition: transform 0.05s, box-shadow 0.05s;
  display: flex;
  align-items: center;
  justify-content: center;
}

.tray-btn:active {
  transform: translateY(3px);
  box-shadow: 0 1px 0 #b45309;
}

.tray-btn.eraser {
  font-size: 22px;
  background: #f1f5f9;
  border-color: #64748b;
  box-shadow: 0 4px 0 #475569;
}
.tray-btn.eraser:active {
  box-shadow: 0 1px 0 #475569;
}

/* 🎈 Pop bubble rewards */
.balloon-layer {
  position: absolute;
  top: 0; left: 0; right: 0; bottom: 0;
  pointer-events: none;
  z-index: 20;
}

.balloon {
  position: absolute;
  top: 100%;
  width: 32px;
  height: 38px;
  border-radius: 50%;
  cursor: pointer;
  z-index: 25;
  animation: floatUp linear forwards;
  box-shadow: inset -3px -3px 0 rgba(0,0,0,0.15);
  pointer-events: auto;
}

.balloon::after {
  content: '';
  position: absolute;
  bottom: -4px;
  left: 50%;
  transform: translateX(-50%);
  width: 0;
  height: 0;
  border-left: 4px solid transparent;
  border-right: 4px solid transparent;
  border-bottom: 4px solid rgba(0,0,0,0.2);
}

.balloon-string {
  position: absolute;
  bottom: -18px;
  left: 50%;
  width: 1px;
  height: 18px;
  background: rgba(0, 0, 0, 0.25);
}

@keyframes floatUp {
  0% { top: 100%; transform: translateX(0); }
  50% { transform: translateX(12px); }
  100% { top: -50px; transform: translateX(-12px); }
}

.pop-effect {
  position: absolute;
  font-size: 26px;
  animation: popFade 0.4s ease-out forwards;
  pointer-events: none;
  z-index: 30;
}

@keyframes popFade {
  0% { transform: scale(0.6); opacity: 1; }
  100% { transform: scale(1.6); opacity: 0; }
}

/* 🎮 Controls Footer */
.controls {
  display: flex;
  gap: 8px;
  z-index: 10;
}

button.ctrl {
  flex: 1;
  padding: 12px;
  font-size: 18px;
  border: none;
  border-radius: 12px;
  background: #b45309;
  color: white;
  font-weight: bold;
  cursor: pointer;
  box-shadow: 0 4px 0 #78350f;
}

button.ctrl:active {
  transform: translateY(2px);
  box-shadow: 0 2px 0 #78350f;
}

/* 📱 Mobile constraints */
@media (max-height: 600px) {
  .app {
    padding: 8px;
    gap: 6px;
  }
  .top-bar {
    padding: 6px 10px;
    font-size: 16px;
  }
  .sudoku-grid {
    gap: 2px;
  }
  .cell {
    font-size: 30px;
  }
  .tray-btn {
    font-size: 20px;
    padding: 4px 0;
  }
  button.ctrl {
    padding: 10px;
    font-size: 16px;
  }
}
</style>
</head>
<body>

<div class="app">
  <div class="top-bar">
    <div class="stats">
      <div>🧩 Niv. <span id="level">1</span></div>
      <div>⭐ <span id="stars">0</span></div>
    </div>
    <div id="reset-btn" style="cursor:pointer; font-size:15px;" onclick="restartLevel()">🔄</div>
  </div>

  <div class="instruction-banner" id="instructions">
    Complète la grille sans doublons par ligne ou colonne !
  </div>

  <div class="grid-container">
    <div class="balloon-layer" id="balloon-container"></div>
    <div class="sudoku-grid" id="grid"></div>
  </div>

  <div class="tray-box">
    <div class="tray-title">Choisis un animal</div>
    <div class="tray-buttons">
      <button class="tray-btn" onclick="insertEmoji(1)">🐶</button>
      <button class="tray-btn" onclick="insertEmoji(2)">🐱</button>
      <button class="tray-btn" onclick="insertEmoji(3)">🐸</button>
      <button class="tray-btn" onclick="insertEmoji(4)">🦊</button>
      <button class="tray-btn eraser" onclick="insertEmoji(0)">🧽</button>
    </div>
  </div>

  <div class="controls" style="display:none;">
    <button class="ctrl" id="start">Jouer</button>
  </div>
</div>

<script>
// 🐶 🐱 🐸 🦊
const EMOJIS = ["", "🐶", "🐱", "🐸", "🦊"];

// 🧩 5 Sudoku challenges (using numbers 1 to 4)
const LEVELS = [
  {
    // Level 1: 4 missing cells
    initial: [
      [1, 2, 0, 4],
      [3, 0, 1, 2],
      [2, 1, 4, 0],
      [0, 3, 2, 1]
    ],
    solution: [
      [1, 2, 3, 4],
      [3, 4, 1, 2],
      [2, 1, 4, 3],
      [4, 3, 2, 1]
    ]
  },
  {
    // Level 2: 6 missing cells
    initial: [
      [0, 2, 3, 4],
      [3, 4, 0, 0],
      [0, 1, 4, 3],
      [4, 0, 2, 0]
    ],
    solution: [
      [1, 2, 3, 4],
      [3, 4, 1, 2],
      [2, 1, 4, 3],
      [4, 3, 2, 1]
    ]
  },
  {
    // Level 3: 8 missing cells
    initial: [
      [1, 0, 0, 4],
      [0, 4, 1, 0],
      [2, 0, 0, 3],
      [0, 3, 2, 0]
    ],
    solution: [
      [1, 2, 3, 4],
      [3, 4, 1, 2],
      [2, 1, 4, 3],
      [4, 3, 2, 1]
    ]
  },
  {
    // Level 4: 10 missing cells (New Sudoku configuration)
    initial: [
      [0, 3, 1, 0],
      [1, 0, 0, 3],
      [0, 4, 2, 0],
      [2, 0, 0, 4]
    ],
    solution: [
      [4, 3, 1, 2],
      [1, 2, 4, 3],
      [3, 4, 2, 1],
      [2, 1, 3, 4]
    ]
  },
  {
    // Level 5: 12 missing cells (Only 4 pre-filled!)
    initial: [
      [0, 0, 1, 0],
      [0, 2, 0, 0],
      [0, 0, 4, 0],
      [0, 3, 0, 0]
    ],
    solution: [
      [4, 3, 1, 2],
      [1, 2, 4, 3],
      [3, 4, 2, 1],
      [2, 1, 3, 4]
    ]
  }
];

let levelIndex = 0;
let stars = 0;
let selectedCell = null; // {r, c}
let currentGrid = [];
let lock = false;
let voices = [];
let ready = false;
let audioCtx = null;

// 🔊 Text-To-Speech Loading
function loadVoices() {
  voices = speechSynthesis.getVoices();
  if (voices.length > 0) ready = true;
}
speechSynthesis.onvoiceschanged = loadVoices;
loadVoices();

function speak(text) {
  if (!ready) return;
  speechSynthesis.cancel();
  const utter = new SpeechSynthesisUtterance(text);
  const frVoice = voices.find(v => v.lang.startsWith("fr"));
  if (frVoice) utter.voice = frVoice;
  utter.lang = "fr-FR";
  utter.rate = 0.95;
  speechSynthesis.speak(utter);
}

// 🎹 Web Audio Sound Synthesizer
function getAudioContext() {
  if (!audioCtx) {
    audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  }
  return audioCtx;
}

function playSound(freqs, type, duration, slide = false) {
  try {
    const ctx = getAudioContext();
    if (ctx.state === 'suspended') ctx.resume();
    const osc = ctx.createOscillator();
    const gain = ctx.createGain();
    
    osc.type = type;
    const t = ctx.currentTime;
    if (slide && freqs.length > 1) {
      osc.frequency.setValueAtTime(freqs[0], t);
      osc.frequency.exponentialRampToValueAtTime(freqs[1], t + duration);
    } else {
      osc.frequency.setValueAtTime(freqs[0], t);
    }
    
    gain.gain.setValueAtTime(0.12, t);
    gain.gain.exponentialRampToValueAtTime(0.001, t + duration);
    
    osc.connect(gain);
    gain.connect(ctx.destination);
    
    osc.start(t);
    osc.stop(t + duration + 0.05);
  } catch (e) {
    console.log("Audio API blocked");
  }
}

function sfxTap() { playSound([350], 'sine', 0.08); }
function sfxSnap() { playSound([440, 520], 'sine', 0.12, true); }
function sfxWrong() { playSound([220, 100], 'sawtooth', 0.5, true); }

function sfxCorrect() {
  const notes = [523.25, 659.25, 783.99, 1046.50];
  notes.forEach((f, i) => {
    setTimeout(() => playSound([f], 'sine', 0.35), i * 110);
  });
}

// 🕹️ Game Core
function restartLevel() {
  speechSynthesis.resume();
  loadLevel();
}

function loadLevel() {
  lock = false;
  selectedCell = null;
  
  const level = LEVELS[levelIndex];
  document.getElementById("level").textContent = levelIndex + 1;
  document.getElementById("instructions").textContent = "Trouve la place de chaque animal !";

  // Clear balloons
  document.getElementById("balloon-container").innerHTML = "";

  // Deep copy initial grid
  currentGrid = level.initial.map(row => [...row]);

  renderGrid();
  setTimeout(speakPrompt, 800);
}

function speakPrompt() {
  speak("Trouve la place de chaque animal sans faire de doublons !");
}

function renderGrid(conflicts = null) {
  const level = LEVELS[levelIndex];
  const gridContainer = document.getElementById("grid");
  gridContainer.innerHTML = "";

  for (let r = 0; r < 4; r++) {
    for (let c = 0; c < 4; c++) {
      const cellBtn = document.createElement("button");
      cellBtn.className = "cell";
      
      const val = currentGrid[r][c];
      cellBtn.textContent = EMOJIS[val];

      const isFixed = level.initial[r][c] !== 0;
      if (isFixed) {
        cellBtn.classList.add("fixed");
      } else {
        cellBtn.onclick = () => selectCell(r, c);
      }

      // Highlight selected
      if (selectedCell && selectedCell.r === r && selectedCell.c === c) {
        cellBtn.classList.add("selected");
      }

      // Highlight conflicts/bad cells
      if (conflicts && conflicts.some(p => p[0] === r && p[1] === c)) {
        cellBtn.classList.add("bad");
      }

      gridContainer.appendChild(cellBtn);
    }
  }
}

function selectCell(r, c) {
  if (lock) return;
  sfxTap();
  selectedCell = { r, c };
  renderGrid();
}

function insertEmoji(val) {
  if (lock || !selectedCell) return;
  
  sfxSnap();
  currentGrid[selectedCell.r][selectedCell.c] = val;
  renderGrid();

  // Auto-validate when all 16 cells are filled
  const isFull = currentGrid.every(row => row.every(val => val !== 0));
  if (isFull) {
    checkSudoku();
  }
}

function checkSudoku() {
  const conflicts = new Set();

  // 1. Check Rows
  for (let r = 0; r < 4; r++) {
    const map = {};
    for (let c = 0; c < 4; c++) {
      const val = currentGrid[r][c];
      if (val !== 0) {
        if (map[val]) {
          conflicts.add(`${r},${c}`);
          conflicts.add(`${r},${map[val].c}`);
        } else {
          map[val] = { r, c };
        }
      }
    }
  }

  // 2. Check Cols
  for (let c = 0; c < 4; c++) {
    const map = {};
    for (let r = 0; r < 4; r++) {
      const val = currentGrid[r][c];
      if (val !== 0) {
        if (map[val]) {
          conflicts.add(`${r},${c}`);
          conflicts.add(`${map[val].r},${c}`);
        } else {
          map[val] = { r, c };
        }
      }
    }
  }

  // 3. Check 2x2 Quadrants
  const quads = [
    [[0,0], [0,1], [1,0], [1,1]],
    [[0,2], [0,3], [1,2], [1,3]],
    [[2,0], [2,1], [3,0], [3,1]],
    [[2,2], [2,3], [3,2], [3,3]]
  ];

  quads.forEach(quad => {
    const map = {};
    quad.forEach(([r, c]) => {
      const val = currentGrid[r][c];
      if (val !== 0) {
        if (map[val]) {
          conflicts.add(`${r},${c}`);
          conflicts.add(`${map[val].r},${map[val].c}`);
        } else {
          map[val] = { r, c };
        }
      }
    });
  });

  if (conflicts.size > 0) {
    // ❌ WRONG! Highlight conflict coordinates
    sfxWrong();
    
    // Parse conflicts set to array
    const conflictsArr = Array.from(conflicts).map(s => s.split(',').map(Number));
    renderGrid(conflictsArr);

    document.getElementById("instructions").textContent = "Oups ! Il y a des doublons.";
    speak("Oups ! Il y a des doublons. Corrige la grille.");
    
    // Clear red highlights after a short shake delay
    setTimeout(() => {
      renderGrid();
    }, 1500);

  } else {
    // 🏆 SUCCESS! Complete matching Sudoku
    lock = true;
    sfxCorrect();
    stars += 10;
    document.getElementById("stars").textContent = stars;

    // Turn all grid cells green
    document.querySelectorAll(".cell").forEach(btn => {
      btn.className = "cell good";
    });

    document.getElementById("instructions").textContent = "Bravo ! Le sudoku est complet !";
    speak("Félicitations ! Le sudoku est complété !");

    // Spawn popping rewards
    setTimeout(spawnBalloons, 400);

    // Advance Level
    setTimeout(() => {
      levelIndex++;
      if (levelIndex >= LEVELS.length) {
        speak("Incroyable ! Tu es un génie du Sudoku !");
        sfxCorrect();

        // Final retry UI
        document.getElementById("grid").innerHTML = `
          <div style="grid-column:span 4; grid-row:span 4; display:flex; justify-content:center; align-items:center; background:#d1fae5; border-radius:12px;">
            <button class="ctrl" style="padding: 16px; width:80%; font-size:20px;" onclick="restartGame()">
              🔄 Rejouer le jeu
            </button>
          </div>
        `;
      } else {
        loadLevel();
      }
    }, 4500);
  }
}

// 🎈 Balloon popping rewards
function spawnBalloons() {
  const container = document.getElementById("balloon-container");
  const colors = ["#f87171", "#60a5fa", "#34d399", "#fbbf24", "#f472b6", "#a78bfa"];
  
  for (let i = 0; i < 7; i++) {
    const balloon = document.createElement("div");
    balloon.className = "balloon";
    const bgCol = colors[Math.floor(Math.random() * colors.length)];
    balloon.style.backgroundColor = bgCol;
    balloon.style.left = `${10 + Math.random() * 80}%`;
    balloon.style.animationDelay = `${Math.random() * 1.0}s`;
    balloon.style.animationDuration = `${3.0 + Math.random() * 1.5}s`;

    // String
    const str = document.createElement("div");
    str.className = "balloon-string";
    balloon.appendChild(str);

    // Tap handler
    balloon.onclick = (e) => {
      e.stopPropagation();
      popBalloon(balloon);
    };

    container.appendChild(balloon);
  }
}

function popBalloon(balloon) {
  sfxPop();
  
  const rect = balloon.getBoundingClientRect();
  const pRect = document.getElementById("balloon-container").getBoundingClientRect();
  
  const pop = document.createElement("div");
  pop.className = "pop-effect";
  pop.textContent = "🎈";
  pop.style.left = `${rect.left - pRect.left}px`;
  pop.style.top = `${rect.top - pRect.top}px`;
  document.getElementById("balloon-container").appendChild(pop);

  if (balloon.parentNode) balloon.parentNode.removeChild(balloon);
  setTimeout(() => {
    if (pop.parentNode) pop.parentNode.removeChild(pop);
  }, 400);

  stars += 1;
  document.getElementById("stars").textContent = stars;
}

function restartGame() {
  levelIndex = 0;
  stars = 0;
  document.getElementById("stars").textContent = stars;
  loadLevel();
}

// Hook start button
document.getElementById("reset-btn").onclick = () => restartLevel();

// Bootstrap
loadLevel();
</script>

</body>
</html>
