<!doctype html>
<html lang="fr">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Jeu géographie</title>
<style>
*{ box-sizing:border-box; margin:0; padding:0; }

body{
  font-family:system-ui;
  display:flex;
  justify-content:center;
  align-items:flex-start;
  min-height:100vh;
  background:#f0f2f5;
  padding:10px;
}

.app{
  width:100%;
  max-width:520px;
  display:flex;
  flex-direction:column;
  gap:10px;
}

.top{
  display:flex;
  justify-content:space-between;
  font-weight:bold;
  font-size:18px;
}

.main{
  background:white;
  padding:12px;
  border-radius:16px;
  display:flex;
  flex-direction:column;
  gap:10px;
}

#map-wrap{
  border-radius:10px;
  overflow:hidden;
  background:#cce8f4;
  cursor:default;
  user-select:none;
}

#map{ display:block; }

.question{
  text-align:center;
  font-size:20px;
  font-weight:900;
  min-height:28px;
}

.controls{
  display:flex;
  gap:6px;
}

button{
  flex:1;
  padding:10px;
  font-size:16px;
  border:none;
  border-radius:12px;
  background:#222;
  color:white;
  font-weight:bold;
  cursor:pointer;
}

button:disabled{
  background:#aaa;
  cursor:default;
}

.grid{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:8px;
}

.choice{
  padding:14px 8px;
  font-size:14px;
  font-weight:700;
  border-radius:12px;
  background:#ffffff;
  border:2px solid #000;
  color:#000;
  cursor:pointer;
  line-height:1.3;
}

.good{ background:#00c853; color:white; border-color:#00c853; }
.bad{  background:#d50000; color:white; border-color:#d50000; }
</style>
</head>
<body>

<div class="app">
  <div class="top">
    <div>✅ <span id="hits">0</span></div>
    <div>❌ <span id="misses">0</span></div>
  </div>
  <div class="main">
    <div id="map-wrap"><svg id="map"></svg></div>
    <div class="question" id="question">Chargement…</div>
    <div id="grid" class="grid"></div>
    <div class="controls">
      <button id="start" disabled>Jouer</button>
      <button id="repeat">🔊</button>
    </div>
  </div>
</div>

// ── D3 setup ────────────────────────────────────────────────────────────────
const W = Math.min(window.innerWidth - 24, 520);
const H = Math.round(W * 0.58);

document.getElementById("map").setAttribute("width",  W);
document.getElementById("map").setAttribute("height", H);

const projection = d3.geoNaturalEarth1()
  .scale(W / 6.3)
  .translate([W / 2, H / 2]);

const path = d3.geoPath().projection(projection);

const svg  = d3.select("#map");
const g    = svg.append("g");

const zoomBeh = d3.zoom()
  .scaleExtent([1, 60])
  .on("zoom", e => g.attr("transform", e.transform));

svg.call(zoomBeh).on("dblclick.zoom", null);

// ── State ────────────────────────────────────────────────────────────────────
let featureById = {};
let availableIds = [];
let round = null;
let lock  = false;
let hits  = 0, misses = 0;
let voices = [], voicesReady = false;

// ── TTS ──────────────────────────────────────────────────────────────────────
function loadVoices(){
  voices = speechSynthesis.getVoices();
  if(voices.length) voicesReady = true;
}
speechSynthesis.onvoiceschanged = loadVoices;
loadVoices();

function speak(text){
  if(!voicesReady) return;
  speechSynthesis.cancel();
  const u = new SpeechSynthesisUtterance(text);
  const fr = voices.find(v => v.lang.startsWith("fr"));
  if(fr) u.voice = fr;
  u.lang = "fr-FR";
  u.rate = 0.9;
  speechSynthesis.speak(u);
}

// ── Helpers ──────────────────────────────────────────────────────────────────
function shuffle(a){ return [...a].sort(() => Math.random() - 0.5); }

function zoomToFeature(feature){
  const [[x0,y0],[x1,y1]] = path.bounds(feature);
  const dx = Math.max(x1 - x0, 4);
  const dy = Math.max(y1 - y0, 4);
  const pad = 3;
  const scale = Math.min(
    50,
    0.9 / Math.max(dx * (1+pad) / W, dy * (1+pad) / H)
  );
  const cx = (x0 + x1) / 2;
  const cy = (y0 + y1) / 2;
  svg.transition().duration(3000)
    .call(zoomBeh.transform,
      d3.zoomIdentity.translate(W/2, H/2).scale(scale).translate(-cx, -cy));
}

// ── Game logic ────────────────────────────────────────────────────────────────
function nextRound(){
  lock = false;

  const targetId = availableIds[Math.floor(Math.random() * availableIds.length)];
  const info     = COUNTRIES[targetId];

  // Wrong answers: same region first, fallback to any
  const sameR = availableIds.filter(id => id !== targetId && COUNTRIES[id].r === info.r);
  const pool  = sameR.length >= 3 ? sameR : availableIds.filter(id => id !== targetId);
  const wrongIds = shuffle(pool).slice(0, 3);
  const choices  = shuffle([targetId, ...wrongIds]);

  round = {targetId, choices};

  // Repaint countries
  g.selectAll(".country")
    .attr("fill",         d => +d.id === targetId ? "#e53935" : "#f5f5f0")
    .attr("stroke",       "#aaa")
    .attr("stroke-width", d => +d.id === targetId ? 0.8 : 0.3);

  zoomToFeature(featureById[targetId]);
  renderChoices(choices);
  document.getElementById("question").textContent = "Quel est ce pays ?";
  setTimeout(() => speak(info.name), 900);
}

function renderChoices(choiceIds){
  const grid = document.getElementById("grid");
  grid.innerHTML = "";
  choiceIds.forEach(id => {
    const b = document.createElement("button");
    b.className = "choice";
    b.textContent = COUNTRIES[id].name;
    b.onclick = () => {
      if(lock) return;
      if(id === round.targetId){
        lock = true;
        hits++;
        document.getElementById("hits").textContent = hits;
        b.classList.add("good");
        document.getElementById("question").textContent = "✓ " + COUNTRIES[id].name;
        speak(COUNTRIES[id].name);
        setTimeout(nextRound, 1100);
      } else {
        misses++;
        document.getElementById("misses").textContent = misses;
        b.classList.add("bad");
        speak(COUNTRIES[id].name);
        setTimeout(() => b.classList.remove("bad"), 350);
      }
    };
    grid.appendChild(b);
  });
}

// ── Init: load TopoJSON ──────────────────────────────────────────────────────
async function init(){
  const world = await d3.json(
    "https://cdn.jsdelivr.net/npm/world-atlas@2/countries-110m.json"
  );
  const geo = topojson.feature(world, world.objects.countries);

  geo.features.forEach(f => {
    if(COUNTRIES[+f.id]) featureById[+f.id] = f;
  });

  availableIds = Object.keys(COUNTRIES)
    .map(Number)
    .filter(id => featureById[id]);

  // Draw all countries
  g.selectAll(".country")
    .data(geo.features)
    .join("path")
    .attr("class",        "country")
    .attr("d",            path)
    .attr("fill",         "#f5f5f0")
    .attr("stroke",       "#aaa")
    .attr("stroke-width", 0.3);

  document.getElementById("question").textContent = "Quel est ce pays ?";
  document.getElementById("start").disabled = false;
}

document.getElementById("start").onclick = () => {
  speechSynthesis.resume();
  nextRound();
};

document.getElementById("repeat").onclick = () => {
  speechSynthesis.resume();
  if(round) speak(COUNTRIES[round.targetId].name);
};

init();
</script>
