<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Livreur en Ville</title>
    <style>
        body { margin:0; padding:16px; font-family:system-ui; background:#ecfeff; color:#164e63; display:flex; flex-direction:column; align-items:center; min-height:100vh; touch-action:manipulation; }
        .stats { font-size:18px; font-weight:900; margin-bottom:10px; }
        .question { font-size:23px; font-weight:900; text-align:center; margin-bottom:12px; min-height:32px; }
        .city { width:min(94vw, 430px); aspect-ratio:1; display:grid; grid-template-columns:repeat(5, 1fr); grid-template-rows:repeat(5, 1fr); gap:7px; background:#0f766e; border:7px solid #115e59; border-radius:18px; padding:8px; box-shadow:0 5px 12px rgba(0,0,0,0.18); }
        .cell { background:#ccfbf1; border-radius:12px; display:flex; align-items:center; justify-content:center; font-size:32px; font-weight:900; position:relative; }
        .road { background:#94a3b8; }
        .wall { background:#334155; }
        .car { background:#fef3c7; outline:5px solid #f59e0b; }
        .home { background:#bbf7d0; }
        .package { background:#fde68a; }
        .controls { display:grid; grid-template-columns:78px 78px 78px; gap:10px; margin-top:16px; justify-content:center; }
        .move, .btn { border:none; border-radius:14px; background:#134e4a; color:white; font-size:24px; font-weight:900; min-height:60px; cursor:pointer; }
        .move.blank { visibility:hidden; }
        .move:active, .btn:active { transform:scale(0.96); }
        .actions { display:flex; gap:10px; flex-wrap:wrap; justify-content:center; }
        .btn { margin-top:14px; padding:12px 22px; font-size:17px; min-height:52px; }
        @media (max-width:390px) {
            .cell { font-size:28px; }
            .controls { grid-template-columns:70px 70px 70px; }
        }
    </style>
</head>
<body>
    <div class="stats">📦 Niveau <span id="level">1</span> | 🚗 Coups <span id="moves">0</span> | ✅ <span id="wins">0</span></div>
    <div class="question" id="question">Prends le colis, puis va à la maison.</div>
    <div class="city" id="city"></div>
    <div class="controls">
        <button class="move blank"></button>
        <button class="move" data-dir="up">↑</button>
        <button class="move blank"></button>
        <button class="move" data-dir="left">←</button>
        <button class="move" data-dir="down">↓</button>
        <button class="move" data-dir="right">→</button>
    </div>
    <div class="actions">
        <button class="btn" id="again">Recommencer</button>
        <button class="btn" id="next">Niveau suivant</button>
    </div>

    <script>
        const SIZE = 5;
        const LEVELS = [
            {car:[4,0], pack:[2,2], home:[0,4], walls:[[1,1],[1,2],[3,2]]},
            {car:[4,4], pack:[2,0], home:[0,3], walls:[[1,1],[2,1],[3,1],[3,3]]},
            {car:[0,0], pack:[4,2], home:[1,4], walls:[[0,2],[1,2],[2,2],[3,0],[3,4]]}
        ];
        let levelIndex = 0, wins = 0, moves = 0, car = [0,0], hasPackage = false;

        function speak(text) {
            const u = new SpeechSynthesisUtterance(text);
            u.lang = 'fr-FR'; u.rate = 0.9;
            speechSynthesis.cancel(); speechSynthesis.speak(u);
        }

        function same(a, b) {
            return a[0] === b[0] && a[1] === b[1];
        }

        function loadLevel() {
            const level = LEVELS[levelIndex];
            car = [...level.car];
            hasPackage = false;
            moves = 0;
            document.getElementById('level').textContent = levelIndex + 1;
            document.getElementById('moves').textContent = moves;
            document.getElementById('question').textContent = 'Prends le colis, puis va à la maison.';
            render();
        }

        function render() {
            const level = LEVELS[levelIndex];
            const city = document.getElementById('city');
            city.innerHTML = '';
            for (let r=0; r<SIZE; r++) {
                for (let c=0; c<SIZE; c++) {
                    const pos = [r, c];
                    const cell = document.createElement('div');
                    cell.className = 'cell road';
                    if (level.walls.some(w => same(w, pos))) {
                        cell.className = 'cell wall';
                        cell.textContent = '🚧';
                    } else if (same(car, pos)) {
                        cell.classList.add('car');
                        cell.textContent = hasPackage ? '🚚' : '🚗';
                    } else if (!hasPackage && same(level.pack, pos)) {
                        cell.classList.add('package');
                        cell.textContent = '📦';
                    } else if (same(level.home, pos)) {
                        cell.classList.add('home');
                        cell.textContent = '🏠';
                    } else {
                        cell.textContent = '·';
                    }
                    city.appendChild(cell);
                }
            }
        }

        function move(dir) {
            const delta = {up:[-1,0], down:[1,0], left:[0,-1], right:[0,1]}[dir];
            const next = [car[0] + delta[0], car[1] + delta[1]];
            const level = LEVELS[levelIndex];
            if (next[0] < 0 || next[0] >= SIZE || next[1] < 0 || next[1] >= SIZE || level.walls.some(w => same(w, next))) {
                speak('Route bloquée');
                return;
            }
            car = next;
            moves++;
            document.getElementById('moves').textContent = moves;
            if (!hasPackage && same(car, level.pack)) {
                hasPackage = true;
                document.getElementById('question').textContent = 'Super ! Maintenant va à la maison.';
                speak('Colis ramassé. Va à la maison.');
            } else if (hasPackage && same(car, level.home)) {
                wins++;
                document.getElementById('wins').textContent = wins;
                document.getElementById('question').textContent = `Livré en ${moves} coups !`;
                speak('Bravo, colis livré !');
                render();
                setTimeout(() => { levelIndex = (levelIndex + 1) % LEVELS.length; loadLevel(); }, 1700);
                return;
            }
            render();
        }

        document.querySelectorAll('.move').forEach(btn => btn.onclick = () => move(btn.dataset.dir));
        document.getElementById('again').onclick = () => { speechSynthesis.resume(); loadLevel(); };
        document.getElementById('next').onclick = () => { speechSynthesis.resume(); levelIndex = (levelIndex + 1) % LEVELS.length; loadLevel(); };
        loadLevel();
    </script>
</body>
</html>
