<!doctype html>
<html lang="fr">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Jeu du Simon</title>
<style>
* {
  box-sizing: border-box;
  margin: 0;
  padding: 0;
}

html, body {
  height: 100%;
  margin: 0;
  padding: 0;
  overflow: hidden;
}

body {
  font-family: system-ui, -apple-system, sans-serif;
  display: flex;
  justify-content: center;
  align-items: center;
  background: #0f172a; /* Slate 900 */
  color: #f8fafc;
  touch-action: manipulation;
}

.app {
  width: 100%;
  max-width: 420px;
  height: 100%;
  padding: 12px;
  display: flex;
  flex-direction: column;
  justify-content: space-between;
  gap: 10px;
  position: relative;
}

/* 📊 Header Stats */
.top-bar {
  display: flex;
  justify-content: space-between;
  align-items: center;
  font-weight: 800;
  font-size: 18px;
  background: #1e293b;
  padding: 10px 14px;
  border-radius: 14px;
  border: 1px solid #334155;
}

.stats {
  display: flex;
  gap: 16px;
}

/* 🔵 The Circular Simon Console */
.console-container {
  flex: 1;
  display: flex;
  justify-content: center;
  align-items: center;
  position: relative;
}

.simon-board {
  position: relative;
  width: min(78vw, 300px);
  height: min(78vw, 300px);
  border-radius: 50%;
  background: #020617;
  border: 10px solid #1e293b;
  box-shadow: 0 10px 25px rgba(0,0,0,0.5);
  display: grid;
  grid-template-columns: 1fr 1fr;
  grid-template-rows: 1fr 1fr;
  gap: 8px;
  padding: 8px;
  overflow: hidden;
  transition: transform 0.1s;
}

.simon-board.shake {
  animation: shakeBoard 0.15s ease-in-out infinite;
}

@keyframes shakeBoard {
  0%, 100% { transform: scale(1) rotate(0deg); }
  25% { transform: scale(0.98) rotate(-3deg); }
  75% { transform: scale(0.98) rotate(3deg); }
}

/* 📐 Quadrants */
.pad {
  border: none;
  cursor: pointer;
  outline: none;
  transition: background-color 0.1s, opacity 0.1s, box-shadow 0.1s;
  opacity: 0.35;
}

.pad:active {
  opacity: 1 !important;
}

.pad.lit {
  opacity: 1 !important;
}

.pad-green {
  background: #10b981; /* Emerald Green */
  border-top-left-radius: 100%;
}
.pad-green.lit {
  box-shadow: 0 0 30px #10b981;
}

.pad-red {
  background: #ef4444; /* Rose Red */
  border-top-right-radius: 100%;
}
.pad-red.lit {
  box-shadow: 0 0 30px #ef4444;
}

.pad-yellow {
  background: #eab308; /* Yellow */
  border-bottom-left-radius: 100%;
}
.pad-yellow.lit {
  box-shadow: 0 0 30px #eab308;
}

.pad-blue {
  background: #3b82f6; /* Royal Blue */
  border-bottom-right-radius: 100%;
}
.pad-blue.lit {
  box-shadow: 0 0 30px #3b82f6;
}

/* ⚪ Center Inner Controller */
.center-circle {
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  width: min(30vw, 115px);
  height: min(30vw, 115px);
  background: #0f172a;
  border: 8px solid #1e293b;
  border-radius: 50%;
  z-index: 10;
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  box-shadow: inset 0 2px 4px rgba(0,0,0,0.5);
  text-align: center;
}

.center-title {
  font-size: 10px;
  font-weight: 800;
  color: #64748b;
  text-transform: uppercase;
  letter-spacing: 0.5px;
  margin-bottom: 2px;
}

.center-status {
  font-size: 15px;
  font-weight: 900;
  color: #f8fafc;
  line-height: 1.2;
  padding: 0 4px;
}

/* 🎮 Controls Footer */
.controls {
  display: flex;
  gap: 8px;
  z-index: 20;
}

button.ctrl {
  flex: 1;
  padding: 14px;
  font-size: 18px;
  border: none;
  border-radius: 12px;
  background: #334155;
  color: white;
  font-weight: bold;
  cursor: pointer;
  box-shadow: 0 4px 0 #1e293b;
  border: 1px solid #475569;
}

button.ctrl:active {
  transform: translateY(2px);
  box-shadow: 0 2px 0 #1e293b;
}

/* 📱 Small Screen Compression */
@media (max-height: 600px) {
  .app {
    padding: 8px;
    gap: 6px;
  }
  .top-bar {
    padding: 6px 10px;
    font-size: 16px;
  }
  button.ctrl {
    padding: 10px;
    font-size: 16px;
  }
}
</style>
</head>
<body>

<div class="app">
  <div class="top-bar">
    <div class="stats">
      <div>🔁 Longueur : <span id="score-box">0</span></div>
      <div>🏆 Max : <span id="best-box">0</span></div>
    </div>
    <div id="reset-btn" style="cursor:pointer; font-size:15px;" onclick="restartGame()">🔄</div>
  </div>

  <div class="console-container">
    <div class="simon-board" id="board">
      <button class="pad pad-green" id="pad-0" onclick="handleInput(0)"></button>
      <button class="pad pad-red" id="pad-1" onclick="handleInput(1)"></button>
      <button class="pad pad-yellow" id="pad-2" onclick="handleInput(2)"></button>
      <button class="pad pad-blue" id="pad-3" onclick="handleInput(3)"></button>
      
      <div class="center-circle">
        <div class="center-title">Simon</div>
        <div class="center-status" id="status-box">Prêt</div>
      </div>
    </div>
  </div>

  <div class="controls">
    <button class="ctrl" id="start">Jouer</button>
    <button class="ctrl" id="repeat" style="max-width: 70px;">🔊</button>
  </div>
</div>

<script>
// 🎹 Milton Bradley Simon pitches (frequencies in Hz)
const FREQS = [415, 310, 252, 209]; // Green, Red, Yellow, Blue
const COLORS = ["Vert", "Rouge", "Jaune", "Bleu"];

let sequence = [];
let userSequence = [];
let userTurn = false;
let bestScore = 0;
let voices = [];
let ready = false;
let audioCtx = null;

// 🔊 Text-To-Speech Loading
function loadVoices() {
  voices = speechSynthesis.getVoices();
  if (voices.length > 0) ready = true;
}
speechSynthesis.onvoiceschanged = loadVoices;
loadVoices();

function speak(text) {
  if (!ready) return;
  speechSynthesis.cancel();
  const utter = new SpeechSynthesisUtterance(text);
  const frVoice = voices.find(v => v.lang.startsWith("fr"));
  if (frVoice) utter.voice = frVoice;
  utter.lang = "fr-FR";
  utter.rate = 0.95;
  speechSynthesis.speak(utter);
}

// 🎹 Web Audio Sound Synthesizer
function getAudioContext() {
  if (!audioCtx) {
    audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  }
  return audioCtx;
}

function playTone(padIdx, duration = 0.3) {
  try {
    const ctx = getAudioContext();
    if (ctx.state === 'suspended') ctx.resume();
    const osc = ctx.createOscillator();
    const gain = ctx.createGain();
    
    // Simon historically used a raw triangle/sine wave for a pure flute-like sound
    osc.type = 'triangle';
    osc.frequency.setValueAtTime(FREQS[padIdx], ctx.currentTime);
    
    gain.gain.setValueAtTime(0.18, ctx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + duration);
    
    osc.connect(gain);
    gain.connect(ctx.destination);
    
    osc.start();
    osc.stop(ctx.currentTime + duration + 0.05);
  } catch (e) {
    console.log("Audio block");
  }
}

function playWrongSound() {
  try {
    const ctx = getAudioContext();
    const osc = ctx.createOscillator();
    const gain = ctx.createGain();
    osc.type = 'sawtooth';
    osc.frequency.setValueAtTime(42, ctx.currentTime);
    gain.gain.setValueAtTime(0.2, ctx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.65);
    osc.connect(gain);
    gain.connect(ctx.destination);
    osc.start();
    osc.stop(ctx.currentTime + 0.7);
  } catch(e) {}
}

function playSuccessChime() {
  const notes = [523.25, 659.25, 783.99, 1046.50]; // Happy C major arpeggio
  notes.forEach((f, i) => {
    setTimeout(() => {
      try {
        const ctx = getAudioContext();
        const osc = ctx.createOscillator();
        const gain = ctx.createGain();
        osc.type = 'sine';
        osc.frequency.value = f;
        gain.gain.setValueAtTime(0.1, ctx.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.35);
        osc.connect(gain);
        gain.connect(ctx.destination);
        osc.start();
        osc.stop(ctx.currentTime + 0.4);
      } catch(e) {}
    }, i * 90);
  });
}

// 🕹️ Game Logic
function restartGame() {
  speechSynthesis.resume();
  sequence = [];
  userSequence = [];
  userTurn = false;
  document.getElementById("score-box").textContent = 0;
  startNextRound();
}

function startNextRound() {
  userTurn = false;
  userSequence = [];
  
  // Add a new random quadrant (0 to 3) to the sequence
  sequence.push(Math.floor(Math.random() * 4));
  document.getElementById("score-box").textContent = sequence.length;

  // Visual text state
  const status = document.getElementById("status-box");
  status.textContent = "Écoute";
  status.style.color = "#eab308"; // Yellow

  setTimeout(() => {
    speakSequence();
  }, 600);
}

function sleep(ms) {
  return new Promise(r => setTimeout(r, ms));
}

// Plays back the sequence visually and with sound
async function speakSequence() {
  userTurn = false;
  
  // Dynamic play speed: gets faster as the sequence gets longer
  const playSpeed = Math.max(220, 500 - sequence.length * 20);
  const pauseSpeed = playSpeed * 0.4;

  for (let i = 0; i < sequence.length; i++) {
    const padIdx = sequence[i];
    await flashPad(padIdx, playSpeed / 1000);
    await sleep(pauseSpeed);
  }

  // Turn control back to user
  userTurn = true;
  const status = document.getElementById("status-box");
  status.textContent = "À toi !";
  status.style.color = "#22c55e"; // Green
  speak("À toi de jouer !");
}

function flashPad(padIdx, duration) {
  return new Promise((resolve) => {
    const pad = document.getElementById(`pad-${padIdx}`);
    pad.classList.add("lit");
    playTone(padIdx, duration);
    
    setTimeout(() => {
      pad.classList.remove("lit");
      resolve();
    }, duration * 1000);
  });
}

function handleInput(padIdx) {
  if (!userTurn) return;

  // Flash clicked pad
  const pad = document.getElementById(`pad-${padIdx}`);
  pad.classList.add("lit");
  playTone(padIdx, 0.25);
  setTimeout(() => pad.classList.remove("lit"), 200);

  userSequence.push(padIdx);
  const currentStep = userSequence.length - 1;

  // 1. Verify correct color
  if (userSequence[currentStep] !== sequence[currentStep]) {
    // WRONG INPUT! GAME OVER
    userTurn = false;
    playWrongSound();
    
    // Shaking visual warning
    const board = document.getElementById("board");
    board.classList.add("shake");
    
    const status = document.getElementById("status-box");
    status.textContent = "Oups !";
    status.style.color = "#ef4444"; // Red

    const finalScore = sequence.length - 1;
    if (finalScore > bestScore) {
      bestScore = finalScore;
      document.getElementById("best-box").textContent = bestScore;
    }

    speak(`Oups ! Partie terminée. Ton score est de ${finalScore}.`);

    setTimeout(() => {
      board.classList.remove("shake");
      status.textContent = "Fin";
      
      // Offer restart button
      document.getElementById("board").onclick = () => {
        document.getElementById("board").onclick = null;
        restartGame();
      };
    }, 1500);
    return;
  }

  // 2. Check if user completed the round
  if (userSequence.length === sequence.length) {
    userTurn = false;
    playSuccessChime();
    
    const status = document.getElementById("status-box");
    status.textContent = "Bravo !";
    status.style.color = "#38bdf8"; // Blue
    speak("Bravo !");

    setTimeout(() => {
      startNextRound();
    }, 1200);
  }
}

// Hook Buttons
document.getElementById("start").onclick = () => {
  getAudioContext().resume();
  speechSynthesis.resume();
  restartGame();
};

document.getElementById("repeat").onclick = () => {
  speechSynthesis.resume();
  if (sequence.length > 0) {
    speakSequence();
  } else {
    speak("Appuie sur Jouer pour commencer.");
  }
};
</script>

</body>
</html>
