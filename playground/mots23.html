<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Suites Logiques</title>
    <style>
        body { margin:0; padding:20px; font-family:system-ui; background:#fff3e0; display:flex; flex-direction:column; align-items:center; min-height:100vh; }
        .stats { font-size:18px; font-weight:bold; margin-bottom:20px; }
        .sequence-box { background:white; padding:20px; border-radius:20px; display:flex; gap:10px; margin-bottom:30px; box-shadow:0 4px 6px rgba(0,0,0,0.1); }
        .item { font-size:40px; width:60px; height:60px; display:flex; align-items:center; justify-content:center; border-radius:12px; }
        .item.placeholder { border:3px dashed #ddd; background:#fafafa; color:#ddd; font-weight:bold; font-size:30px; }
        .choices { display:flex; gap:15px; }
        .choice { background:white; font-size:40px; width:80px; height:80px; display:flex; align-items:center; justify-content:center; border-radius:20px; cursor:pointer; box-shadow:0 4px 6px rgba(0,0,0,0.1); border:3px solid transparent; transition:transform 0.1s; }
        .choice:active { transform:scale(0.9); }
        .good { border-color:#00c853; }
        .bad { border-color:#d50000; }
        .btn { margin-top:40px; padding:15px 40px; font-size:18px; background:#222; color:white; border:none; border-radius:12px; cursor:pointer; }
    </style>
</head>
<body>
    <div class="stats">✅ <span id="hits">0</span> | ❌ <span id="misses">0</span></div>
    <div id="game-content" style="display:none; flex-direction:column; align-items:center;">
        <div class="sequence-box" id="sequence"></div>
        <div class="choices" id="choices"></div>
    </div>
    <button class="btn" id="start">Jouer</button>

    <script>
        const ICONS = ['🔴', '🟦', '⭐️', '🍀', '🍎', '🐱'];
        let hits=0, misses=0, currentCorrect=null, lock=false;

        function speak(t){
            const u=new SpeechSynthesisUtterance(t); u.lang='fr-FR'; u.rate=1.0;
            speechSynthesis.cancel(); speechSynthesis.speak(u);
        }

        function nextRound() {
            lock=false;
            const type = Math.floor(Math.random()*3); // 0: ABAB, 1: AABAAB, 2: ABCABC
            let pattern = [];
            const icons = [...ICONS].sort(() => Math.random()-0.5);
            
            if(type===0) pattern = [icons[0], icons[1], icons[0], icons[1], icons[0]];
            else if(type===1) pattern = [icons[0], icons[0], icons[1], icons[0], icons[0]];
            else pattern = [icons[0], icons[1], icons[2], icons[0], icons[1]];

            currentCorrect = type===0 ? icons[1] : (type===1 ? icons[1] : icons[2]);

            const seqBox = document.getElementById('sequence');
            seqBox.innerHTML = '';
            pattern.forEach(item => {
                const div = document.createElement('div');
                div.className = 'item';
                div.textContent = item;
                seqBox.appendChild(div);
            });
            const placeholder = document.createElement('div');
            placeholder.className = 'item placeholder';
            placeholder.textContent = '?';
            seqBox.appendChild(placeholder);

            const choiceBox = document.getElementById('choices');
            choiceBox.innerHTML = '';
            const choicePool = [currentCorrect];
            while(choicePool.length < 3) {
                const ri = ICONS[Math.floor(Math.random()*ICONS.length)];
                if(!choicePool.includes(ri)) choicePool.push(ri);
            }
            choicePool.sort(() => Math.random()-0.5).forEach(c => {
                const div = document.createElement('div');
                div.className = 'choice';
                div.textContent = c;
                div.onclick = () => {
                    if(lock) return;
                    if(c === currentCorrect) {
                        lock=true; hits++; document.getElementById('hits').textContent=hits;
                        div.classList.add('good'); speak("Gagné !"); setTimeout(nextRound, 1500);
                    } else {
                        misses++; document.getElementById('misses').textContent=misses;
                        div.classList.add('bad'); speak("Essaie encore."); setTimeout(()=>div.classList.remove('bad'), 500);
                    }
                };
                choiceBox.appendChild(div);
            });
            speak("Quelle forme complète la suite ?");
        }

        document.getElementById('start').onclick = () => { 
            speechSynthesis.resume(); 
            document.getElementById('game-content').style.display='flex';
            document.getElementById('start').style.display='none';
            nextRound(); 
        };
    </script>
</body>
</html>
